front:
  text: 蒲室集天地之相感而文生焉氣神周流物象變化而不可窮已者亦由文章之出乎人者矣故夫以高下厚薄夷險肥磽荒易之地以通乎風雨雷霆霜露之用摩蕩聚散消息起伏各因其所在而發焉千態萬狀之迹其可涯哉是故必有聰明特達之材而充其周普融攝之識觀乎天人古今之變以達其浩博精要之理而後足以為文也嗟乎鮮矣彼局促於呫畢之間每不足以得之而妙𢍆心要於形骸之外者庶幾言之無礙執之而無方以縱橫出入於當時者乎南昌欣公早有得於其宗精神所及六藝百家殆不足學也故其說法之餘肆筆為文莫之能禦以豫所知自其先師北澗簡公物初觀公晦機熙公相繼坐大道場開示其法然皆有別集汪洋紆餘辨博瓌異則欣公之所為有自來矣我文皇建大剎於潛邸之舊處特起欣公居之天縱神明度越前代取一士而表異之冠乎東南之叢林其遇合之故尊禮之意豈凡庸所得窺其萬一欣公於是吸江海於硯席肆風雲於筆端一聖十年應四方來者之永則一代人物之交見乎篇章簡什者殆無虗日豈尋常根器之所能哉豫與欣公相知二十年天曆至順間一𭁡解后京師殆未暇及茲事歸臥山中五六載方外之士相遭於淡泊時得見其一二已不勝其驚喜高上人久從公游不鄙豫之𮕱朽而來過焉乃盡得所為蒲室集者數巨帙惜豫有子夏丘明之疾危坐虗室使善讀書者琅然誦之如洞庭之野衆樂並作鏗宏軒昂蛟龍起躍物怪屏之沈冥發興至於名教節義則感厲奮激老於文學者不能過也何其快哉何其快哉豈期寂寥遲暮之餘而有此獲也故題其編末而歸之至元四年歲在戊寅四月八日蜀群虞集鈫蒲室集仰山虛谷和尚住山江湖東嶼和尚住靈隱行宣政院雲外和尚再住天童瀨翁和尚住淨慈諸山湛堂法師住上竺江湖元叟和尚住山諸山竺田和尚住靈隱集慶諸山真如菴遷住下竺行院靈石和尚住淨慈行院如一溪住寶林行院潤王𡶩住演福教寺江湖璨無瑕住上虞南杭諸山秀枯木住四明大慈諸山存古鏡住象山太平行院蘭首座住南潯祇園杭諸山圓方外住義興善權杭諸山凱南叟住車塘廣福教寺諸山南叟住廣福三宗諸山暢文溪住象山蓬來杭諸山山門二義首座住四明妙智諸山進鐵辟住婺州天寧江湖氷羅源住溫州淨杜諸山當湖新建福源寺請林平山開山杭諸山恱住普福教寺諸山竺源和尚住崑山薦嚴杭諸山孫住上虞資聖寺杭諸山範準堂住台州法輪諸山靈一源住鳳山資福杭諸山有子有住本覺杭諸山王藍田住廬山栖賢杭諸山竺田住圓通杭諸山楓橋泰天與遷龍興天寧杭諸山瑛石室住昌國隆教杭諸山山首座照了堂住龍興旌忠杭諸山了堂住旌忠山門淨慈首座古鏡堂住天目大覺諸山穎中山住天平杭諸山瑞少曇住光嚴行院唯一巖住安吉常樂院報國寧晉翁住天封諸山能仁逸日休遷保寧諸山周南翁住集慶能仁捴管府蕪湖吉祥香東陵住清凉江湖淵萬宗住龍山山門茂古林住江心行院愚如菴住仰山行院恩斷江住開元行院誠古心住仰山杭諸山恱南楚住妙果住顯慈杭諸山仙竺堂住興善來竺源住翠巖行院鄹東山住江隂悟空行院明雪窗住圓覺江湖定空山住瑞光觀遠山住四明佛巖江湖宣無言住鳳山資福行院如一溪住浙江萬壽江湖卯無文住高豪潔瑩中住台州澄心諸山玉蘊中住道吾杭諸山澤元泉住昌國普慈諸山珍𠦑蘊住象山等慈江湖芝住四明珠龍淵住碧雲行院全衡山住淨杜杭諸山楷不模住越之延慶杭諸宣政院奏改中天竺為天曆萬壽永祚禪寺請如一溪住持曇芳和尚住山集慶諸山了即休住金山集慶諸山依無住住台州慶善杭諸山逸休耕住越之天華寺西竺僧荊門建寺化佛殿帝師殿化供具淨慈寺鐘經二樓化淨慈寺化五色猿千佛閣化夏供台州護聖寺僧刺血書法華經化藏經高麗惠因寺化修造長橋寺化修造山圓鑑菴化田常州崇勝寺化修造鐘山修造化廬山東林寺化中天竺修造化疏𮓜寺素祖師象化蜀僧琦老化藏經歸蜀奉勑重修百丈清規語聖節啓散二祈晴祈雨祈雪遣蝗日食月食佛降誕佛成道佛涅槃帝師涅槃達磨忘百丈忘楞嚴會啓散二景命日祝香聖節祝香水陸齊奏上文宗皇帝表薦佛智師薦受業祖高峰雲和尚薦參請師友薦徒弟行宥知津䒭疏薦方外交薦先陳公孤魂榜

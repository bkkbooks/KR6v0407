body:
  text: 豫章釋大訢笑隱律詩七言萬歲山蜿蜒金翠倚青虛谷時傳萬歲聲葆羽𣯶旓雲氣濕玉龍鱗甲夜寒生𨵿河拱挹皇居壯宮殿深嚴聖慮清自媿山林麋鹿性也隨鵷鷺到承明黃河阻風九域重尋禹蹟荒喜𦗟縣水夜浪浪中原迤邐河流壯元氣汪洋地脈長萬里風雲來黯澹五更星斗下光芒我行不有神靈助風送天香自帝傍高彥敬尚書墨竹西域高侯自愛山此君冰雪故相看倉梧帝子秋風淚翠袖佳人日莫寒妙處寧論銕鈎鏁深情莫報翠琅玗誅茅何處隂厓底靜看梢頭玉露溥送郭幹卿學士赴奎章閣次趙魯公韻二首歲晏俄聞上國行安車可是莫年情早朝翠霧沾衣濕夜直銀河入坐清社稷憂勤霜鬢短江湖㱕夢釣𮈔輕相携不盡丁寧語歌斷驪駒白下城短褐寧陪衣繡行相忘道術愧深情光分玉樹精神合氣肅金盤沆瀣清孤鳳遠㱕阿閣晚六鼇浮去五山輕微踪亦與扁舟約烟水南詢第幾城次韻王繼學侍御金陵襍詠十首新到建業翩翩茟勢捲春潮自倚經綸荅聖朝澣海天高霜鶻徤沙堤華發玉驕只知鼇負三山重誰信鵬搏萬里遙今日鳥臺還趣召聚觀父老滿江橋江表風流辱寵臨青山無恙只如今高陵雲合遺金化秋浦凉生古玉沉吏散圖書齋閣靜公餘女樂後堂深題詩石壁山靈護莫遣春風薜荔侵龍翔寺潛宮樓觀頌中興王氣東南百倍增瞻鵲欲從銀漢度攀龍空想白雲乘經營不惜金沙布𮨇命猶傳玉几馮誰識再來房次律重尋茟記吾曾君子堂堂名君子為君開喜報傳呼柳下來當道豺狼應屏跡故山𤠔鶴莫驚猜波搖翡翠風生佩露冷金莖月滿臺况是青谿江摠宅黑頭勛業未低回東窓看山微茫翠浪瀉青瑤木未斜分鳥道遙雲斂江亭初過雨月明津樹欲生潮厓根橘柚知誰種磵曲茅茨許共撨不羨東山攜妓看堆盤鱠玉映紅消忠勤樓自負東南一劒橫故膺宸翰錫嘉名帛書峴首愁歸鴈鼙鼓江心吼怒鯨落木藂祠孤淚墮西風長笛壯心驚奸雄欺國真兒戲只比藏鉤謾闘嬴重登忠勤樓宋亡諸將寂無聞猶有高樓倚莫雲并幹璇題彫雉羽碑墓玉篆缺龍文君恩虛負忠勤寵王道須知禮義尊空與後人增感嘅當時羅綺只醺醺獨坐君子堂繼學甞師鄧善之鄧綿州人也海上歸來鬢未霜登臨應不愧斯堂風生葆羽迎仙盖華散氍毹供佛香江上蘼蕪隨意綠雨中新樹過人長綿州學士深埋玉淚濕遺編可得忘賞心亭碌碌從人媿抱𨵿賞心應共鶴飛還孤舟野水東西渡落日長淮遠近山神鼓乍喧香霧合賔筵初散緑隂間相思只尺長相隔一似河流九曲灣潛宮御榻當年小殿西龍光照地起虹霓蓬來珠舘珊瑚樹夜月瑤臺白玉梯甲帳列營環衛密龜茲按拍蹋歌齊代來故事馮誰紀只有季季杜宇啼為餘同知賦林泉興在林泉道自存不妨吏隱駐高軒蒼生未起東山臥坐客先留北海尊谷口風高青兕吼厓根雨過玉龍奔壯夫出處皆隨分且及明時報主恩次韻馬昂夫捴管飲僊橋詩銕鏁高縣隔杳冥僊橋有路上瑤京夜凉暗覺潛蛟動曉色微看素練平坤極尚遺神禹力山靈空識祖龍名爛柯舊事馮誰問石柱題詩薜荔生贈王吉甫提舉至治未嘗為樞密掾建議誅逆賊史臣書之早贊中樞勇有謀翩翩茟勢萬貅直書趙盾辭無媿請討陳恒志未委質朝廷思報効得官隴𤱈課鋤耰野人好惡無偏徇老穉遮留擁道周次韻吳間間宗師贈茅山徐真人當年野服謾朝天不羨稽山賀老舩翠蜃夜蟠金井月采鸞朝下玉鑪烟俄聞刼燒嗟灰墨還見宮成慶醴泉莫道仙人無白髮步虗聲裏又年年次韻薩天錫臺郎賦三益堂夫容華開未覺早霜殘留伴仙人酒半闌翡翠巢空秋浦淨落霞飛盡莫江寒玉真對月啼雙頰楚神迎風舞七盤持向毘耶聽說法病翁元作色空看次韻王伯循僉事將上江東留別江南江北白雲秋隨分高情且宦游醉著氍毹歸月下夢披葭葦釣槎頭光生玉宇秋先見氣肅銀河夜不收明日繡衣終遠別看山不盡更登樓謝張雪峯司農惠西域諸果殊方佳實未知名何幸分甘及野僧把玩乍疑金粟碎緘題還愛翠囊盛紅鮮色映琱盤露樣液寒生玉井冰報以鹽梅助調鼎願言百祿與川增張公天上人乘槎𭹀果南來合拜嘉楚子謾誇萍勝蜜安期不數棗如瓜敢忘止足求多味己分充飢飽一麻但喜遐荒時入貢氊車風露滿流沙次韻張夢臣侍御太子千秋日燕龍翔寺天香一騎出燕山閶闔雲開近可攀華渚龍光瞻斗極芒碭雲氣識龍顏紀𮈣吳楚東南重事業夔伯仲間燕罷題詩烟景暮松高千尺鶴飛還李遵道墨竹二首有羙清揚鬢髮垂神颷為佩氷為衣亂鸞萬舞群仙下葆羽多儀帝子歸翠色夜寒雲靡靡綠隂晝靜日暉暉李公父子深埋玉誰賞淋漓酔醉墨揮長憶篔簹谷裏行蕭蕭几杖早凉生庭虛月色僧還倚院靜秋聲客獨驚仙鳳去隨秦弄玉雲驂留待許飛瓊錦綳只愛龍孫好溥露梢頭照眼明王元戴御史為沈禹錫畫洞庭圖白簡風生嶽色秋揮豪能為故人霜華慘澹青楓樹日微茫杜若洲萬化肧胎元氣濕巨靈斧鑒五丁愁何時聽徹鈞天樂從此乘雲八極游送太禧宗禋院觀志能照磨監造御還朝宗禋從事儗分曹卷耳誰憐我馬勞犧象雲雷陳秬䲭夷風露出蒲陶周廬入直天光近待漏隨班斗柄高此去使鴻傳好語雲中錦字認揮豪謝郭道淵以詩慶住新寺住近城南尺五天眼看金屋會群仙雲霞海上無三嶋風月人間即四禪父老多情思沛邑從官有意賦甘泉恩波不獨新蘭若麟鳳呈祥五百年次韻荅曹德昭臺郎見寄華雕欄護玉墀光涵珠綱耀摩𡰱室空誰問維摩病才紀徒憐𮨇愷癡塵土污人思自奮雲霄舉翮欲何之期君臺閣鵷鸞集濯濯清風尉所知曹德昭嘗蒙寄詩已率諸徒同和呂仲實僉憲偶見連和三首相遺予與仲實未及識感其相知率爾次韻上荅桂殿蘭宮九尺墀從游扑握與伊𡰱形殘佝僂空全智腹飽侏儒只學癡厚贈瓊琚非報也載瞻銀漢欲杭之道同何必論傾盖白首如新不易知百挫摧殘不自持雪山巢頂愧芻𡰱人祈天女多求巧我學吳兒欲賣癡拭目扶搖斯下矣馳心江漢願東之使車不欲煩迎只恐星移太史知繡衣千里想光儀何待蒙倛識象𡰱鼠首兩端知吏黠螘酣萬穴笑兒癡孔顏聖域先登矣儒墨風流一貫之願續三賢龍井社山行應許野僧知仲實復和見貽勉荅二首佛國親登七寶墀見超無見捴持𡰱情塵空盡還同俗結習都忘不斷癡東嶺雲㱕招共𪧐北山鶴𭜨任它之吾徒未識毘耶老衣染天華不自知當年射䇿動舟墀獨考遺經演聖𡰱早化鵾鵬矜意氣宜憐鸎燕語嬌癡支郎居越逢玄度蘇子來吳識器之脫畧形骸忘物我風流莫遣俗人知張夢臣侍御題東林李伯高西疇詩卷次韻二首風流一代盍纓簪千載令人感慕深老去歸田三逕樂賢勞報國百年心霜餘鞠圃踈堪摘雪後梅坡遠獨尋山水至今遺愛在風清如聽倚梧吟濟南汶上政相隣只合歸畊致此身雉雊淺畬乘日薄鳩啼初雨燒痕新彭殤俱盡同今古物我無私孰主賔欲問香山容入社底須更覓葛天民送張可道管勾赴任西臺臺閣清流孰與同還家乘傳似乘𩣭西秦風物由來盛三輔𨵿河自古雄邑子爭迎舟簇簇津亭張燕鼓隆隆相期衣繡重來日還訪青谿野水東雪窓蘭誰把幽芳寄所思山林久已負歸期蘿龕賸箸雲千頃蕙帳空留月一規作賦何人捐洛佩招魂有恨吊湘纍因知老衲勞揮灑杖錫敲冰上劒池送趙仲德歸國學受業兼東其父宗吉待制文采家聲固足褒也應地勝得人豪遺民思遠唐風古大岳疆分晉水高壯志聞鷄思擊楫雄才倚馬待揮毫而翁久檀𮈔綸羙露冷穹廬夜直勞送笡子敬赴蒼梧尹簡書深念遠人安出宰蒼梧選上班虛市穀登秋社早津亭柝靜晝隂間島夷德被唐虞世鄒魯風移桂象間奉詔遺祠躬謁奠忍看藂竹雨斑斑送韓九成臺郎赴中臺賢勞念子獨遐征上計郵程夜不停月暈有虹蓮碧海星流如使度青冥權衡執法裁風紀檮杭誅奸肅政刑報奏歸來承異渥好迂𩣭馬到林坰送趙子威臺郎還都王事雖勞足勝游千官迎候夜鳴騶憲綱久著威名重人望還椎學術優攬轡直踰沙漠雪題詩偏愛海門秋歸臺更羙皇華使報奏天光動璪旒送楊文舉赴江淛省宣使凍解春泥柳未青騑騑四牡在林坰家聲弈世推韓斗天上何人識使星黃閣盍簪春盎盎火城分直夜熒熒明年重對賢良䇿第一臚傳出漢庭柯敬仲墨竹二首醉墨淋漓雨露春九重何止動奎文老龍夜奮千年蟄采鳳朝翔五色雲淇澳多賢歌衛武倉梧有淚憶湘君買山只合舟丘住賸種清隂為我分何處龍吟百丈泓驟驚風雨助縱橫紆拳石藏千畒次第寒梢發寸萌解谷何人調六律柯亭無客賞奇聲五湖付與垂綸手斬取長竽掣巨鯨柯敬仲作枯木竹石圖寄樵隱御史命題其上木石山中託舊盟歲寒不改此君清相期雲霧隨龍化更待天風引鳳鳴靜對聞琴宜夜雨間來欹枕愛秋聲老樵自是伶倫手調入黃鐘取次成子昂竹石竹君石丈舊相忘曾奉王孫直玉堂碧映雲氣合潤侵官硯露華凉平泉回首班樵牧艮嶽隨時化犬羊猶想胷中丘壑在龜谿拱木雨浪浪眉壽堂為趙子威照磨賦壽域鈞陶萬類春華堂偏尉白頭親黃封蟻汎雲霞動紫誥鸞回雨露新閥閱聯姻森虎兕曾玄弈葉盡麒麟繡衣不改班衣樂忠孝兼全在子身次韻馮東麓侍御游鍾山詩底須勝集慕山隂只尺鍾山足訪尋留客但教尊有酒歸田寧計橐無金才名久著三朝望經律仍窮萬化心一代風流真可畫後來感嘅亦由今東麓侍御赴燕南憲使留別次韻奉餞從車祖帳候城隂留別題詩辱重尋愧乏鷫鷞斗酒空憐駿骨市千金烏臺衣繡中朝貴牛巷烟簑故國心萬世不磨存有道人間彈指去來今蒲室集卷之六目錄絕句五言米元暉江山秋晚圖二首松雪翁墨蘭畫牛溪山小景口四首為海樵公送別絕句七言次韻馬虛中道士送熊以善之金陵四首次韻荅石室元晦五首贈日者沈愛山次韻荅熊以善秀才風雨歸舟圖古廟折碑圖贈𮨇可和二首虞伯生學士以五絕贈一上人蒙見及一公將歸蜀謁趙魯公次韻墨梅為馮仲碩賦李息齋墨竹雪窓蘭舟至通州夜雨大作次韻送廖天與魚樂圖畫馬湘水行春圖淵明歸去圖百圖孤嶼圖梅雪齋為逯彥常賦李遵道墨竹次韻荅失蠻彥脩御史五首贈了空羽士秋夜𪧐瓜洲江風山月樓寄西山李𠁅士𪧐雪峯菴游仙濟法師清鏡閣次韻馮侍御留題鐘山八功德水東麓侍御赴燕南憲使留別次韻奉餞竹石圖為喜近仁臺即賦聯句秋夜同大原張翥仲舉永嘉李孝光季和龍翔寺聯句

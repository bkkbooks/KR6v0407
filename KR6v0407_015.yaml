body:
  text: 豫章釋大欣笑隱銘集慶路天禧寺講堂鐘銘聖教東漸時尚屯僧會始以設利徵教傳千年演大乘音聞孔揚鏗華鯨聞寂覺空妙道凝非言非默非色聲天清地寧歲豐登祈天壽考億萬齡集慶路天寧禪寺鐘銘天寧深公葺其寺大完作鐘以考擊之衆肅如也南昌大欣為之銘曰大哉聖教顯幽咸若一音普聞萬類齊作疇克宣之有聲春容警昏啓聵開陽闔隂夙夜有恆與時降升籟鳴于谷龍吟于泓大啓其機怒潮迅霆聞而岡覺視此刻銘集慶路崇因禪寺鐘銘有序天曆元年七月文皇發建業幸江陵臺臣從至新亭之崇因寺張燕而別明年遣使賜白金于寺又八年住山正逵葺其寺大完作巨鐘宣教令警幽聵以無忘美墻之思焉豫章大欣為之銘曰龍光有煒新亭燕喜神用相止宜膺大寶高陵言言氣鬱而宜爰播鴻音上聞于天天聽匪遐顧我下土大定超然一息萬古永懷聖德有聞而覺聞寂覺圓萬化磅礡勗哉皇皇而應無方谷虛不盈吾道其有終板銘匪朝匪暮兮爾聲孔揚更百世兮爾質彌貞吁嗟乎人之有生龍河廣智菴鐘銘龍集丁東菴成鐘在欣作銘扣而應器之弘寂彌覺聞非聲板銘警怠昏惟爾訓誠之至天人應天臨路開福禪寺鐘銘有序皇帝南巡時嘗幸潭之開福寺住山志福以遭寵遇懼莫報稱乃曰觀音大士由音聞以證圓通而鐘又音之弘者警昏啓聵為益滋多於是範金為巨鐘扣擊以𮚏鴻𨤲而宣聖德也使來謁銘銘曰邈矣南服維嶽奠之六龍行天然眷之眷之維何繄我覺皇維皇同德以宅萬方如霆之震百蟄斯作大風何從萬谷若答徽音鴻烈不在金石神人報功願播無斁乃酌金齊乃擊乃考聲容孔昭亦寓于教萬室夜遙匪警而寤闡幽出冥有萬其趣疇不耳聞而聞以性六用無偶萬物齊應川后山君不有駿奔何福不降以開皇元吾宗尚賴昌于世世刻銘同久敢告鳬氏集慶路定林寺鐘銘定林寺法嵩講主化諸檀越作大鐘龍翔寺住山比丘大欣為作銘大揚聖教辭暢理彰機之弗齊或翕或張有聞咸作爾音于鍠如發其蔀啓幽迪陽進修無住由聞取證常覺而妙聞亦非性今古無間物我同真非言非默常宣法音設教如是惟嵩克似勒此訓辭以告鳧氏饒州路安國寺鐘銘有序番易諸山舊多名𪧐故妄庸者不敢廁其列西竺紹曇歸住安國寺既以才德之美服其人又能興廢補弊範金為巨鐘朝夕扣擊以警其徒使來謁銘銘曰無象之先同乎一元有生以形如流失源惟覺有訓克復于本耳聰而聞聞𥁞聲泯聞性不昧非寂非聲空劫日用非去來今鯨呿雲合番水如答大定安安不起于榻拯彼沈溺漫漫九泉長夜忽且而升于天導師作鐘其旨如是以如是聞無愧鳧氏廣智菴三小鐘銘聞而覺覺而妙心非佛智非道體之成備五行扣而鳴妙與化冥孰謂人有知覺于不如物之無情笑隱子作鐘朝夕扣之以警吾徒二磬銘聞無聞妙而神兮靜而應不敬兮寧國路崇敬禪寺鐘銘有序番易克齊參南屏佛智歸住南陵之崇教草五年矣大新其寺復鑄巨鐘以宜其教使夫人天幽明異類聞而警悟以證入圓通三昧其施不亦博乎乞銘於龍河笑隱大欣為之銘曰扣而應體元靜用則神誠夫性噫惟汝不言之令湖州路資福禪寺鐘銘有序番易正逵田金陵崇因遷湖之資福以久廢方爬梳補苴未一載而鬱攸之變逵乃益自勵誓圖興復先有巨鐘為浙右冠銷鑠澌𥁞矣始謀更作之非欲侈舊觀所以肅藂林齊教令使幽冥異類由音聞以返聞自性成無上道而人神以和則寺之完美可計日成功也寓書求銘為之銘曰計籌之山禺泉淵淵武恭之阡禪宮渠渠禪祖是居有林其徒道傳教宣不煩於言考鐘于縣警聵啓昏聞於無聞惟覺之元囿于化中或塞而通罹彼祝融作我中興百煉愈剛其聲孔楊鳳躍鯨呿萬礎星羅惟逵之勞蚤夜以同令音無窮有永吾宗寧國路珩琅禪寺鐘銘求嘉啓一𨵿住宣城珩琅禪寺繕修大完復作巨鐘寓書求銘為作銘曰傳道以言言有窮示以寂默或不通資汝考擊開群聾警昏䇿怠善以萌聞於無聞聞性空無思無修超聖功珩琅削玉青璁瓏杯渡振錫遺奇蹤惟啓似之昌厥宗欲以萬石留春容鼓槖特奮千夫雄寒潭照空吟老龍虛谷答響萬竅風啓之善訓寧無同我為銘之惟汝庸建昌路福山禪寺鐘銘鼎山新禪師主肝之福山寺百廢具舉乃範金為巨鐘使來謁銘銘曰閩楚之交山斷若玦師據其衝過者必閲無當其機夕默斯要假爾令音以宣其教爾虛有容而應不窮十方無間如風度空霜月夜寒萬籟不作聞非有聞覺亦非覺差爾來學妙乎師承大振厥宗我銘是徵銘存存齋銘為趙公子去疾作人之奉身輿馬器服或假或失終求以復性生而靜人所均有奔軼蕩泊頃刻莫守貴物賤己重外惑內秪益其愚胡寧不畏大雅君子存存以究顛沛周旋儼若前後若倚於衡以左以右不越衽席彌綸宇宙匪邇而遐河海流潤莫著乎隱鳥飛魚泳怡怡慈順維涼國是訓匪訓于室以施于邦國近思齋銘為偰公遠作天日之遠圭測其景泉流地中汲深以綆道大如大德淵如泉我求而獲衽席之間聽視言動或外誘之川潰于防何以復之萬殊一本萬古一息日用無間燕處飲食亦有萬卷父子師友載膏爾車言駕周道于王作賔公矦之孫乃眷環堵岌其高門敬學齋銘為管元賔作工試以藝巧力日至賈之於利歲閲月計我治于內日益日損莠鉏其驕苗糞其本六合之富萬物之有我獻我酬我納自牖物我無聯而應無方如雲膚寸雨于八荒不有滔滔其源濫觴朂君子銘以勿忘魯山銘有序文皇以孝治天下嚴祀祖考特設太禧院捴之復置隆祥使司皆以師相領其事其司屬悉選用不輕授平江善農提舉司其屬也掌承天龍翔崇禧三寺之田賦高昌嶽公魯山實為官長龍翔以文皇潛宮安奉神御春秋二忌臺臣展祭如生後至元五年正月嶽公來董祀事凡酒醴牲牷殽果體節之薦視滌之潔禮敬俱至觀者大悅謂公雖貴胃而詩禮如素習其稱魯山為宜為作銘曰高昌之裔去魯萬里孰羡魯邦魯多君子魯山維藩岱嶽中起盈靈育秀天𢌿厥美魯山之雲為雨崇朝魯山之石盡為璚瑤作我國珍生甫及申不于其身以施後人定林佳處銘金陵王載之讀書于祖隴𮚏善精舍扁其室曰定林佳處笑隱子為作銘曰定林有泉有蟄蜿蜒靈雨無爽作我豐年定林有石無以攻玉為圭為璋泄我膏沐桓桓舒國平生伊周用不逮志終愧巢由青松華髮逆𣄆身世歸榮千出佳處在是朂爾後求志乃翁蓄而不施天嗇其豐豈無駟馬來林之下無易其處樂我鐘鼓頑石銘荊山有璞和刖其足靈璧有貢裕陵之辱我守其頑庶全太朴傲皴于雪霜寄偃蹇于林薄無光潤以媚煙雲無廉稜以露鋒鍔爾羊群牧爾牛礪角苔溫夜趺風清專壑勺一窪於四溟載一卷于五嶽所謂外癯而中配懿德之無怍者也書𭘧軒銘鄭同甫名其室為書𭘧軒取鄭康成居不其山有草如曰書𭘧云里人大欣為之銘曰通德之里聖學淵藪道之翕張乾綱坤紐大和薰蒸庶物蕃膴山有豐草溥露湑湑穆如清風沛然時雨厭原訏訏化成郢魯克纘其緒子鄭同甫言擷其英於焉容與以束以紉萬卷有序蓻孔碩舜陶不窳爾維似之以昌而祖臥雲室銘燕息之安孰不求遂藉之氍毹奉以甘毳或惴于心背若芒刺千金廣居不易吾廬有淹自西其光如濡匪昵匪聊與子娛或以寢處或以寤歌不違衽席孰阻嚴阿其居伊何維德是似庶幾無愧旌以勿替祭文祭中峯和尚文嘗觀於人有負不世之材鍾蓋代之氣天機矜能神巧運智仕崇謗興名高毀至如焚膏之坊炎俄光炯而燼棄孰若我師之無為若將頺然於一世故太聲之遠播倐颷馳而雷厲萬乘向風安車莫致三公問道跪拜趨事亦有島夷致書奉弊士女提㩗千里委積家祠繪像教載飲食如嚴君親惕若僕吏公固逃之莫釋重纍垂髮垢衣茅茨不剃澗飲一瓢食粥一器世皆仰公莫識公志內己外物高穹厚地行通神明化率異類特其小耳道豈在是辨劇連環理貫百氏脫口千言落筆萬字夫豈多能公之遊戲濟北正宗凜乎將墜譬之九鼎一絲是寄叢林荒荒黨鬪族詈勢奪貨取魔孽方熾如取大盜官授之位肆行詭隨孰剔其偽彼之所榮公之所愧故於大方却走畏避宗唱之濫衆響同吹口耳授受相悅狐媚師寧不言豈曰無意誰其嗣之百不一試世無知公千古長喟遺言見及置我爐錘豈敢忘之撫膺惴惴正宗是慟胡收我涕祭鄧善之使君文惟公學究天人之奧道通性命之原已驗諸死生之際神完氣正遺濁世之孤騫則我方外之友無牽于愛夫何戚戚於言又歷觀其平生令聞聲光駭動一世亦風厲而霆奔早入成均下帷討論暨領憲綱民以不冤乃鉏其驕此苗而莠乃黜其偽彼鶴而軒至若經筵之召對示師道之益尊進嘉言於啓沃𮚏一氣之元元或霜露以成物或煦育之春溫灝灝乎如河漢之無極孰窺其演於崑崙幸名遂而身退猶眷眷于寵恩就第賜金侑之上尊固人生之無憾後垂裕于後昆愧我野衲往來公門蒲龕夜定葉朝翻啓玄機於破的會衆説而剖藩拯泥塗之墊溺炳炬照於重昏故吾宗之紀述每增重於璵璠美哉黼黻䇄乎崇垣念德音之未遠睇磨崖之可捫此吾黨所以致哀于一奠而莫能起公于九原然公之靈何往而不在豈與死而同𥁞生而獨存蓋將亘乎終古融諸萬象包六合而隘乾坤則公與我之無間又何侍於三生石上之魂冀有聞而擊節庶不徒薦於蘋蘩祭照元晦文延祐六年八月三日元晦照公書記示寂於湖之餘慶菴越八月訃至明日南山友人四明覺恩建安自如豫章大欣等具湯茗時羞之奠為文而祭之曰公居里閭孰非遠遊取友四方楚蜀閩甌其友何人孰感于中匪親匪䁥涕之無從不以令德既賢且藝顴頰豐貌天授之器莫知其它居焉即世無寧多能以速百歲彼昧昧者或鼓其啄謂善可怠謂惡可肆我知彼蒼無預公事豈無壽考泯沒誰記公之不年萬古長喟顏柳楷書陶韋五字亦有萬卷佛孔百氏尚遺身後光怪設利世可聞見猶或不墜矧其內者非我能議胡攪于懷蘊藻莫𬾨公寧有知薦此歔欷庶幾吾徒是訓是勵祭信南海文豫與兄同侍先師入浙相處固密且久而衆中交遊動成阡陌送死聞訃時若驚憂及事過即忘獨聞兄訃惻惻不已者追念先師在百丈時衆不滿百常多奇士兄剛直孤介人以令器期之後聞出世有衆千人大行先師之道於嶺海間年三十一而化此其可痛也又臨終時璝弟適在側以訃音隨海舶而至舟數四將覆而僅免若有神護以致兄之言於豫也則豫之言兄豈有不聞者耶近時師資不明其上者取古人緒餘口耳授受而下者以賄勢阿附同黨牽援而豫與兄幸無此愧故今設奠于室敢以無愧者為薦冀兄大寂定中聞之有以契于懷也尚饗祭徒弟知津文自汝從吾十有三載吾役汝以勞而不能訓汝之道吾有負於汝矣吾以天子賜田欲復其賦役而遺後人以安故遣行宥與汝請命于朝九三入京往返數萬里使汝負病朝夕號呼行已及境不能信𪧐而至以見吾面竟客死于維揚汝常晨起誦經夜為鬼神施食力疾危唑念佛不輟而終賴友人買棺闍維𮖐骨而歸嗚呼痛哉汝身頎然吐音如鐘往來朝貴間善致辭令御下有恩而威賞必行司帑𢈔無毛髮苟取又能諭其黨使皆廉勤故吾每事委汝汝益勞悴而久受疾于身不以吾告而不知也汝無它儲惟有米百九十石皆吾積年以與汝者汝臨終之言以七十石貸於客戶歲取息給衆僧之醫藥八十石以奉母及諸弟四十石與受業中竺并吾院吾悉如汝言也汝二弟吾教之恤之使省汝父母汝前年沉洲開田六千寺之衆賴其食於無窮也吾令沉洲之人祀汝使一飯必祭擇地為竁以葬汝骨旌汝之勞而尉吾思吾固知哀悼之無益而惻惻不能忘汝者以茲山開創之不易求輔佐之能如汝者無數人焉其誰與謀之乎吾常與汝言吾年未甚老而衰憊異常俟蠲賦之文下即求退而菴居汝方壯豈無二十年以養吾老然後隨汝之器而授汝之道庶幾汝之力而息汝之勞豈謂汝遽舍我而先歿也汝壯猶不可恃况吾衰憊者又豈可逆料哉昔吾祖以栽松道人之老囑其委化再來付以衣法汝能效之則吾當忍死以待汝汝有知乎汝無知乎吊鎦忠憲公文士平居議論無所不至臨小利害則易其守孰有委質徇義殺身成仁者乎故觀人之道惟死不容偽曾子易簀子路𦀽纓雖有常有變之不同而同歸于正龍逢比于死於諫伋壽申生死於父命前史書之若中丞鎦公伯宣之死死於其官者也至元中公為行臺官居金陵時江淮省有權貴怙勢不法公命御史劾之馳奏語泄權貴賂宰執誣公以它事追逮維揚公手書付從子自誠謂臺臣義不受辱引佩刀自決天下共痛之而呫呫者謂公剛氣不忍死待辨能目暴白不必有罪縱有罪不必死噫以公之智之才豈不能是苟能是正小人之僥幸而公所深耻者也况其時權臣肆威酷吏濟必深文巧詆鍛鍊成獄公宜屈膝就訊偷生免禍哉縱身脫虎口而臺綱委地故慷慨就死使朝知臺有直臣而紀綱益振姦邪膽落而小人知有所畏矣公死三十年御史臺請于朝諡忠憲追封彭城公又二十年公從子持卿以公遺書示豫豫伏迹林下於世無所欣戚然於公之死不自知其悲且憤也可敦薄俗為詞以悼之其詞曰山有虎兮水有蛟欲禦其害兮吾操吾力匪力之弗敵兮匪智之弗周時偶失利兮竟殞身而弗救肆彼蛟虎兮反起其仇人不念之兮忍匿笑而聚尤終譽顯顯兮莫贖其勞尚賈餘勇兮神與化遊浮雲驂兮龍為輈覽故土兮尉子憂子憂兮曷瘳些悲風兮大招祭穎侍者文吾宗授受不乳而鷇機應氣感克類克肖子有令姿爰啓其要有聲㫪容如樂九奏庶幾吾宗可起其什寧有鬼神顧我弗祐有生藝藝萬化一囿生之維艱既育既茂我刈我穫胡剪我秀人猶念之我心孔疚物有不齊將誰歸咎我祭而享失辭以侑祭徒弟行宥文吾德薄多艱纍諸徒以勞役而致斃者凡數人而汝最苦痛始吾起廢杬之鳳山汝來佐吾繕修五年而寺完及遷中竺鬱攸之變克圖興復汝勞居多天曆之初文皇以潛邸為寺召吾主之始未有稟給薪米鹽醯惟汝措晝元𮈒間上命鬻田于寺蠲其差稅而未得省部文下使汝請千朝一再往返萬五千里經涉四載風雨渴飢傷汝肌骨吏文深刻甲可乙否勞汝憂思幸賴卿相愍汝之誠憐汝之勤啓奏兩宮文移臺省官免逋數積千餘貽後人以安惠及百世觸𭵴來歸嬰疾未覺豫喜汝至露坐通夕吾欲退休命捴庶務汝辭以疾吾固不許豈謂竟死於是耶以汝之能吾愛之至不知速汝于死汝亦忠勤不逆吾志死不辭勞汝在京都奔走官事或終日不食吾書責汝過於儉苦無斳口體而𢦤其生以貽吾憂孰謂驗於今日也吾住山一無所成而纍人以死不能為汝師矣遺恨冥冥可勝痛毒吾受命先帝開創茲山欲弘吾祖之道訓迪後人必資於居室食用而所以命汝者為衆也非為己也期於報先帝而弘吾祖之道也而今則已矣吾疾日加雖退而未能去譏謗蝟生無寧日矣况復失汝而任吾事者誰歟汝初入都吾與汝金汝愳不足罄私槖以行歸不求償而歸其贄弊之餘纖介無取又良難也汝忠於師勤於衆為善而不蒙其福人所與而天奪之何如也彼貪無厭竭于貨而覆厥事而壽而康者又何如也而果回施報之説為虛矣或謂業感三世得非嗇於今而豐其報於身後若是固有之而昧昧者不得而知也汝力疾危坐念佛而化佛即自性念念不昧無係於身之生滅世之延促庸置欣戚於其間哉然至人不遺情達士不廢禮雖寓一哀何傷焉于以明師資之道盡死生之義我心汝靈洞然今古吾欲吾哭之不慟不可也祭徑山元叟和尚文公與先師齊驅宋季潛子器之雷動一世後七十年惟公獨在趙州汾陽高出行輩如見先師床下受拜策我駑蹇針我狂隘我來金陵不阻書誨我眷茲山翠華所屆倚公之重雄冠海岱纍請于朝待命不至胡以訃聞德音未沫濟北之宗藐焉孤寄承之何人化為異類所恃惟公庶幾知畏公復往矣而我何恃如舉九鼎畀之孺稚胡力之任不顛以躓孰云潢潦可接巨𣲖孰云焦壤可沃霈霈猶不遐遺置我爐錘有其臨光吐虹霓尚聆後訓遲烈颷厲平生幾何萬古長喟吾宗是慟匪私我涕祭高獨峯文高公獨峯長老於至正二年七月十一日往赴海鹽天寧住持於九月草八日示寂越二十日訃聞十月草五日龍翔寺住持大欣設位于東菴披誦華嚴法華妙典用伸莊嚴仍以湯茗之奠而祭之以文曰師友道喪汙合黨分子有卓識獨拔其群始求其師淩霄集雲取友于何龍河之濆以道淬礪如奯與存潛子器之輔之以文追琢之妙盡為璵璠衆羽翾飛集于鳳鸞庶幾吾徒以討以論彌年嬰疾尚接笑言列剎之聘歡動于鄰我惜其去懼勞厥身方通安問隨以訃聞居然隔世曾不逾旬如戒長途出戶摧轅雲天萬里飛不盡翰遺物分寄益感義敦猶懷慈母白頭倚門貽書故園聞者悲辛念子粹美無愧古人平生已矣徒薦蘋蘩尚享祭瑛石室文前育王石室法弟禪師以至正三年三月十七日示寂於吳江受經普向院闍維獲設利齒牙不燼陪葬於受業祖三藏道法師之踰月訃至豫以山門科徵稅糧無暇越八月十七日光師晦機和尚遠忌乃具位以配備湯茗時羞之奠而哭之以文曰寓形於化衆萬不同及觀其盡均於一空我痛石室天育令質道昌于言玩華咀實四方仰之寂音仲靈載登玉兒我祖是承胡病而窶寒暑莫禦我闖其臥僵起厲語遺物示意佛祖是貽死生永訣不忘葴規逾月聞訃設利朧表之窣堵如三藏公為位設奠書緩告罪先師諱日期子克配師友無人我何獨立道喪千載寧忍一泣尚享祭徒弟寶滿文汝親昆季四人從釋三為吾徒皆能效力汝兄赴都不返而卒曾不半載汝又繼沒孰不憐汝我痛何極我徒亦多獨汝溫克役汝于勞靡間朝夕寒暑渴飢奔走匍匐速汝于死繄我之匿孰非虛幻有生何益牽于愛思如焚如溺吾嘗訓汝先聖是則太定如如常用而寂物我同體今古一息汝惟昭昭起然自得我何不忘撫念疇昔汝有遺言散汝遺物吾與汝粟歲貨取息遇夏設供與衆同食石新成樹之松柏期與汝兄同葬汝骨汝聽吾言庶尉悽咽大元廣智金悟大禪師太中大夫住太龍翔集慶寺釋教宗主兼領五山寺笑隱欣公行道記有𮚏自太慧果禪師大弘臨濟之宗於東南晚得佛照光以為之嗣北澗簡傳之至物初觀而得晦機熙公江南既歸國朝禪宗尊𪧐共扶其道者數公而已晦機充以老成為國柱右隆然繼之名稱普聞於天下者則廣智全悟大禪師欣公其人也公諱大欣字笑隱姓陳氏本九江義門唐尚書操諸孫分居南昌先墓有豫章之木持異神於相地者占之曰是當生奇男子為名僧其道大行樹枯其徵也已而果然師生於至元甲申八月二十七日生之夕所居宅地若震動人為驚異稍長入鄉校穎悟過常兒書過眼轉成誦其親以出遊至佛寺必瞻拜戀慕不能去父母知其忘俾從伯氏之為僧於郡城水陸院法雲者九年雲之徒彰為剃髮受具戒居八年學問日廣知求佛法大意一山萬公住廬山之開先即往見焉時年十七山一見留之左右日夕警誨歎曰吾友晦機在百丈子欲咨決究竟非見吾友不可師稟命詣百丈晦機識其奇偉於眉睫間即使侍方丈他日謂之曰昔黃龍得旨泐潭領徒遊方及見慈明氣索汙下汝且道過在甚處語未絁師抗聲曰千年桃核裏覓甚舊時仁久之俾掌書記一日舉百丈野狐話問之師擬議晦機震威一喝師於是群疑頓釋得無礙智同參苦咨問之師後有頌云百丈野狐野狐百丈埋著一坑伏惟尚享諸方多誦之晦機一日定中見天門有榜師名為首因謂師曰昔東山祖有言我不得勤遠則負慈明矣汝善保任乎晦機遷淨慈師從之仍以為書記晦機説法文理精詣嘗謂師曰昔雪竇真淨及我妙喜以來內自教乘傍及儒老子百家之言深入要眇故其文言浩乎如川至之不可禦也師神觀高邁音吐如洪鐘素以博洽聞至其辨論古今如指諸掌執筆書事文士良史莫或過之一時名勝如恩斷江如一溪茂古林宣無言卓有行業皆與師為忘年交本中峯居天目山之師子嚴中外信向甚盛師嘗謁之語至夜參半忽大風崖石欲墮左右辟易師危坐如平時峰亦服其定力矣而學士大夫如吳興趙文敏公孟俯已西鄧康莊公文原四明袁文清公桷房山高公彥敬東陽胡長孺汲仲錢唐仇遠近仁延祐進士莆城禓載仲𪪺金華黃溍溍鄉及今翰林待制京兆社本伯原前後負時盛名與師為文學之友者也晦機著萬一山銘屬師代作請文敏公書之公一見大驚異以為真得古文法公為杭州僧作顯教院記亦屬師代之及成不易一字署己名以書至大辛亥初受請住湖州之鳥回祝香之次諸山咸歎晦機之得人矣大報國寺者回宋故宮而為之延祐庚申災諸剎尊𪧐共迎師起廢未從也趙公為親作以請既至大作新之寺田之在宜興者連歲不入師為歸其侵始有以食其衆江浙行省丞相脫歡公故答剌𦉴順德王之子也以世勛名德靖重知大體兼行宣政院事領東南浮圖之教凡大剎非名德不輕授特請師住中天竺人無間言而師名日起矣天曆初元師夢神龍騰空覺而異之作偈以識既而天子以金陵潛邸作大龍翔集慶寺命江南行御史臺督視其成嘗有𭥍曰江南大剎皆前代所為甲乙之次頗有定品今日之作規制位望冝無加焉方大臣難於開法主者師之器量久在淵衷命為太中大夫號曰廣智全悟大禪師為開山弟一代師恢弘鬯達泛應無滯偉然江海之上舒卷自在不偏於空寂又明年與蔣山曇芳忠俱召至京師京師之為禪宗者出迎河上曰國家尚教乘廟之建為禪者寂然禪剎興於今代自師始吾徒賴焉師謝曰遵其行之為律宣其言之為教傳其心之為禪有言有行皆所以明是心也吾徒無負祖師西來意它不足論也日召對奎章閣賜坐説佛心要深契上旨館於太禧宗禋院勑設伊蒲妙饌賜貂裘金衲衣及諸金幣皆內府珍異上嘗知師所為文曰蒲室集者命昭孝寺大司徒法洪取進法洪亦博洽內外典深為講達上問師嗣法何人曰元熙也因𮚏其道業源委上嘉歎命學士虞集製銘賜之居十日中使問尉洽至請還從之賜中天竺名曰天曆永祚寺而命師之菴居曰廣智皆命虞集為之書祖道於城南僧舍凡食設皆貴臣以上旨為之主上之眷斯寺也外以臺臣護視使者從中來賜與無虛月皇上至元二年以老病求退御史大夫撒迪公以聞優詔不許加號釋教宗主兼領五山寺餘如故而賜豫尤厚匡匪之頒遍及寺衆勑外臺護視使安居而終老焉先百丈有禪清規其徒遵用之嘗有旨命師修改乃分為九章今行焉於是中朝西域高昌三韓滇池于闐與湖江淮漢𨵿蜀閩廣之俊傑四面而至法席莫尚焉師之居於是也自中朝外藩臺閣風紀貴人名公卿至者莫不頎蓋為禮非人力所能致也而文詞語言流傳四方震蕩耳目亦顧雄發於一時矣初給錢為中𮈒鈔者二十萬緡設官領之取子錢以為食後廢其官以歸寺之人出納為息不能盡一稍病之至正元年勑有司市民良田以傳寺歲賦粟以食公私無所係纍歎曰吾徒庶晏佚一搏於朝夕吾亦老且休矣四年五月一日為文書請以徑山忠曇芳代己升堂擊鼓辭衆退居廣智菴居兼旬肩輿與御史大夫脫歡公為別留書凡與交遊之善者命弟子兩朝賜己金弊等𥁞以付寺僧俾營萬佛閣以報國恩既乃臥示疾明且天大風雨白晝變暝召入室弟子各加勉諭從容作偈儼然而逝是月草四日壬子也得年六十一僧臘四十六初龍翔寺成營三於石頭城之東岡弟子龕奉全身措於院自憲臺郡縣大小吏士緇素老送者萬衆隂雲四興涼颸泄然行者不知暑衆散始罷八月礱石為坎於石城之岡十六日奉而藏焉表浮圖於其上其徒之在杭州報國永祚者又奉師遺齒瓜髮而於鳳皇山師四會説法皆有語録提頌敘説宗旨外集詩文若干卷即所謂蒲室集者也度弟子若干人傳法住山者若干人師性至孝父母蚤卒母蕭氏方盛年即持齊念佛以居師受請報國時母率餘子薦新祖考庭前忽生華形如白蓮蓋芝類也鄉人聚觀香色彌月不減占者以為師之瑞應也師雖不得至左右而心常不忘目其文曰蒲室者所以識宗家睦州織鞋為養之故事也故其為文為人子言必曰孝為人臣言必曰忠為朋友之交言必曰信至語其徒脫愛岡離無明直指本性以悟為則誘掖以進之激昂以發之奮迅以決之機用迭發政令獨行其門人以所得各有記可考也噫人才實難江濤眇然居忌不恆能靜以應向使不為方外之歸亦足以用世者豫與師相知四十年見師身受龍翔之寄至于今十有七載歸老江上亦十二年向與交遊者皆已𥁞矣弟子懷渭本其甥也清修善學有舅氏之風渭之為名亦所以識也以其同門之意使豫書其遺事可勝慨乎乃述𮚏曰維昔至元皇有南服神明合完生息來復預章楩楠殿於湖江幹立條揚乃發駿厖文林蕭條靡契嘉會肆其修能求法方外達磨傳心別濟為宗至妙喜天縱橫朗融遠紹緒流必有惠辨惟全悟師弘偉超鍊四坐道場説法沛然吐辭湧泉如洪如元衛法如嵩不咈明教織蒲養親睦州之孝表裏東南捴于金陵皇作梵宮龍翔是徵崇臺在焉耳目攸寄以領佛事孰克堪是鼓鐘震驚龍象人天嶽峙山連莫之雄先金具珠璧園林澤道護萬福好爵嘉錫宣其惠慈作新成規來嚮來參雲奔海馳皇仁如天函覆如一俾善其衆休燕以室風雨漂搖安如須彌生去來何足控持既念故交違越年歲訊諸門人以作斯記前奎章閣侍書學士翰林侍講學士通奉大夫知制誥兼修國史蜀郡虞集記𣴎應二年初冬風月莊左衛門刊行

body:
  text: 豫章釋大欣笑隱題跋題宋高宗書東方朔答客難後佛惠居霅多得故家圖史書畫又與松雪翁交號稱博古後至元丙子九月佛惠遷化其高弟耀公以所藏宋高宗書東方朔答客難示豫豫於珍玩古物圖畫字帖皆不能辨松雪嘗誚豫以不韻豫謂雖不識物而能識人漢高不知文縱知武亦多戰敗至治生産業皆不能獨能為君耳宋徽宗無不能而獨不能為君若高宗雖稱中興然不能用李綱宗澤與諸將如漢光以克復中原為可惜也然其慈仁謹儉憂民愛賢可謂守久之主况其字畫之妙可傳後世乎念二翁之不復見追憶疇昔以識所感故書于後題三教圖孔子嘗問禮於老聃圖之以為揖讓可也佛生西竺未嘗至中國又時相先後而亦見於圖何也若以其道同心同雖善言言者言所不能及豈筆舌可形容哉晝史欲託諸圖像以會其同而好辨者反資以立異孰若得其心同道同而忘言也題陳世榮血書金剛經後唐元德秀李觀喪其親瀝指血書佛經以資福或者謂親則亡矣而徇俗薦悼何益哉豫謂元李為唐儒宗其講亦熟矣知親之靈然不昧者不與草木同腐則神明變化死生往復天人萬類必有所歸而佛之以性喻金剛之不壞而般若者性之常明波羅蜜者梵語到彼岸猶儒之止於至善也夫孝子之心以衰絰哭泣不足𥁞其哀慕而求親之靈如佛所謂不壞而常明者超彼岸以止乎至善其於愛親不至已乎金陵陳世榮刺血書金剛經以報亡母祈於悟上乘超淨域惟以見其高識有合於元李諸賢而無惑於未習淺議為可嘉也他日其子以示豫謂先君手澤未嘗一日去目詩曰孝子不匱永錫爾類陳氏有焉謹書其後而歸之書金陵十詩後鄧善之為豫言肯堂王公與果長老厚善逮果化去而繼學於是夕生今年夏繼學來為南臺侍御質之云先公嘗指豫言果長老將化而來別云復有草年之聚豫二十餘先公棄世則善之之言為然也繼學居官不數月而去視豫若𪧐契每作詩必録示吾黨和之者百篇而永嘉安雪心為書繼學喜而尤喜雪心書後有作率令書之雪心取豫稿命題其後豫聞佛制其徒母溺於文藝恐其偏重若溺而力不能以自舉惟大乘者假之以護教禦侮可也不識果老為何如人得非所謂溺者乎智永好書而為房次律則可戒公以傳宗自任而為蘇子瞻則吾法不取也吾與雪心可以為鑒云題安國寺記後東坡蘇公為五祖戒禪師後身及謫黃州往來西山樊口皆其前生舊遊處也作安國寺記云道不足以御氣性不足以勝習歸誠佛僧求一洗之蓋其失在最初一念何待得罪於朝而始悔悟夫富貴利欲之鑠人甚於膏火安知患難摧沮非玉成於公也蘭莊禪師嘗倡道準西以安國舊記不存求豫書將重刻之豫戲謂蘭莊雖造道深密而未忘文字之習當以戒為鑒母效尤也蘭莊笑曰董喙能毒人而良醫以之愈疾庸何傷焉且吾欲補安國之缺而使世之慢佛者讀之視公而自愧故不辭而為書之書瞻雲亭詩後豫久不作詩為張君所強不得已而賦仲南見而求書之云將歸番省親志所同也豫謂世之言孝莫過於曾子曾子以先意承志諭父母於道孝之大者而口體之奉次焉蓋人所貴在知道知道在明性明性可振天地萬世而獨存而親之所以命吾者在是也仲南遍參名𪧐為豫掌藏才敏過人有高行而造夫道歸以諭其親不既重乎視慈明之白金睦州之織屨猶未忘乎世禮也於吾詩何取焉書商學士畫山水圖詩後豫十歲祝髮即受沙彌戒則綺語口業便當絶之而父師命猶令不離學館至十八遊方始棄文字然為人所強往往不工有愧作者故力辭謝又取人憎惡年及衰邁猶不能脫然淨盡信𪧐習染人未易洗滌或謂菩薩假諸伎藝以如幻三昧因事攝化則吾不能知天目具上人命書舊作將使吾知過責悔以自新耶其以世俗喜文而謂我能隨機善導耶知我罪我當有識者題疑翠樓詩卷後南昌饒益寺去城四十里與豫族最相近豫甚幼時族人往往抱攜至寺及豫從伯父祝髮城居惟歲時歸省得寓𪧐焉寺耆年平山端公遇豫猶子姪然後豫以匡徒留浙繼受命來金陵而不能歸者三十二年矣平山之孫大亨如淵出方外從豫遊淵以寺有樓求賦味於所交名士臨川危太檏以可望五老西山之勝命曰凝翠而為記文詩章者纍軸淵為豫執侍常勉之進道以其將歸而徵贈言也因以茲樓喻乏子得諸公之賦無不盡工然無一人嘗至其處徒想像形容之求身臨而目擊者莫豫若也雖不能言庸何傷亦猶吾宗傳心之妙必親證悟而後言可徵信子歸拜而祖質之而承顏於罄咳叱吒或盎而春倐而雷電蔚然虎變而龍躍則吾亦不能知也雖篇什之多將何以為哉題黃山谷詩後蘇子瞻薦魯直有曰瑰偉之文妙絶當世孝友之行追配古人平生𥁞之其詩與字畫特餘事爾後魯直參禪老晦堂聞桂香悟道故超然於患難死生之表而視子瞻之論又大有徑庭矣因觀答任道教授詩評之如此使魯直復生必以豫言為然題米元章書後元章多蓄晉人書帖作寶晉齋而其書豪放自成一家所謂善學柳下惠不師其迹者也題斗極杓公遺訓臨江靈峯寺自斗極杓公開山至今才七十年而其後數世皆以德望重禪林必其家法嚴肅願力宏深故爾及觀遺訓遺偈蕳直淳正則信然遠孫極宗玄公機辨過人法才雅瞻而持其祖訓出入必俱奉之惟謹則凡靈峯之徒可槩見矣而視它之大方所至如逃亡家豈其祖訓願力獨不如斗極者乎嘗求之昔有創業之主藏其耕具以示後人懼其狃於貴盛使無忘厥初其後則耻而棄毀之至覆敗流亡永為耕夫亦不可得而悔無及矣以是觀之諸方之廢而靈峯獨盛者以能守其家訓也極宗請書于後云題王荊公尋僧圖荊公操守學問高一世以經濟自任及為相不酌夫時世之異取周官國眼為息之意行青苗市易之法如唐相房琯用春秋車戰而敗也公猶以望重時君相如哲宗溫公莫敢終非之始蔣山元老期公於早歲謂能甘淡泊如頭陀棄名利如脫髮故晚年間居若悟其失以應夫外者既愆於用而是非榮辱復何足較不若齊得喪一死生以䇿勛于內可窮天地振萬世之為得也乃日尋禪老遊有深旨矣後人不能悼其才悲其志廣而用迂復過為詆毀吾故取唐史論琯事以見其義云書卯土寺記後豫在卿里數從卯土諸耆𪧐遊出方外又與其徒慧滿道高道昭錢唐金陵間交益厚故求豫文記之高居龍河十餘年由記室為首座禪餘不廢詩文有唐人作者之妙敦節義勵操履若虞揭先輩斡克莊王伯循諸名公皆與交至正元年六月得奇疾二年七月始疾愈行宣政院又檄請主海鹽之天寧寺吳中士夫咸喜其至爭以詩偈來謁賀隨問隨答纍牘而書不以病起為困九月草七日州巨姓敷高坐迎請舉揚聽者千人莫歸猶肅客至二鼓假寐早作潄盥足不能立而仆掖之坐語含胡呼謂寺之老與從行義境曰吾住山六旬施利衣物悉歸寺吾母老可以舊所儲五百緡奉湯藥餘以買石刻寺記歸卯土境如所教得石太湖鐫之舟載以歸而境為豫執侍復請識其後高字獨峯云而記所謂𣲖別為三曰紹祥紹經紹益永康正因慧月法濟志大道高義制禮中者妙曉之𣲖也而紹祥無弟子曰紹洪永寧正覺惠滿法喜智聚道東仁寓義境者妙觀之𣲖也曰紹端永瓚正傳惠燈法雲志謙智玉道昭道敏仁安義珍永則信果者妙隆之𣲖也題東林寺重刻李雍碑後廬山之勝甲天下而東林又山之勝處也由遠法師居之而名益重至宋照覺捴公易為禪林而寺始大其間名賢品題不啻千百獨李雍碑以字畫之妙為世所珍延祐七年寺火碑壞住山古智禪師既新其寺復取李雍碑舊本重摹刻之或謂道無今古時有廢興而文以紀一時之事耳師者宜訓人以道於字畫何取焉而禪師之言曰道外事乎事外道乎華嚴法界世俗衆藝皆為道用且吾以興復之勞欲後之繼吾居者皆若遠公照覺能隆其道以昌吾宗又豈無如雍者而述之於將來也故吾刻之石庶有勸於後云龍翔法弟大欣聞而識其説于下題放魚記後越之諸暨有湖環其廳治歲取魚鱉之利以助公用宋政和中有陳尹者禁采捕以舟載魚悉縱之長江中復語芝園照公使記其事雖惻隱之見於一時亦足以覘其平日之用心矣夫仁及蟲魚則惠於其民可知也能與名僧遊則其具正信為法檀度尤可知矣視今汗吏其民使不聊生又漁取吾徒至傾資以結之飫酒胾以啖之猶不能免况有澤及鱗介者乎豫不能隨時俯仰動遭譏詬固無芝園之道以化其俗又安得陳尹之為政使民與物各安其生而吾徒可倚為外護者明慶杲宗師以芝園遺墨命題重吾所感云題趙間間書心經後司馬君實嘗書心經以贈僧復題其後謂韓退之排佛而稱大顛外形骸以理自勝要自𮌚中無滯礙由是觀之於佛不為無得而所排者迹爾迹之弊雖聖人不能去若惡其迹而棄其本是猶𢙣焚溺而罪水火惡噎而罪饔者也雖其好惡取舍之不同猶能明佛之理而交其徒之賢者視今之庸俗隨時趨尚孰有察夫理而別其徒之賢否哉太原白氏世為金國名臣正大年間有樞密院判諱華者為亡父朝列君資冥福設齋以延三教之名士時間間趙公書心經遺之以其親之不可見而靈明不昧者未嘗亡也若經云五蘊十八界四諦十二緣生皆外物之纍於心了無所礙雖以之振天地窮萬世而不變不壞是所謂以道諭其親孝之大者也後趙所書經散落江南樞寧君五世孫名瀆字子通為御史掾得之南僧舍及子通仕建康録判遇知文皇于潛邸連升為青塔慶壽集慶三寺營繕司官暇日出經示豫豫愧非大顛輩可接退之諸賢而獲交豫通子通明敏進用未已可強其宗詩曰孝子不匱永錫爾類白氏有焉頌大龍翔集慶寺素覺皇像頌有序天曆元年十有二月上命以金陵潛宮為大龍翔集慶寺營之三年寺成以至順辛未十有一月草有四日立覺皇像住持臣僧大欣謹拜手稽首獻頌曰天道悠邈至理可推靡愆豫度寒燠四時龍之變化不可度思時潛特飛雲氣隨之聖德如天其動猶龍澤及九有焉舊宮舊宮峩峩神物撝訶祀我覺皇降福實多惟覺之道有權有經天人異類岡不或承并包百氏妙合大同匪窒而有匪蕩而空道之精微言所不及疇宣于教而像斯立像立教宣如振于鐸我拜我瞻其容於鑠一善之萌蹶然有作孰鋤其驕悍夫惕若凡今臣庶有萬其區方之中土壤異俗殊岡不由教畏惡遷善矧是邦人和樂衍衍鍾山左顧石城右回如瞻雲旗輦路逶迤爰播仁風八表同春物安其性人合道真金石可磨我頌何有天子萬壽與天同久針約之針有序義興裕上人問字於豫豫字以約之彼儒者謂孟施舍之守氣不如曾子之守約約要也言求於外不若歹求諸身吾與裕學佛者也佛之道多方東漢時法入中國又四百年而達摩始至以直指之道教人而人廓然獲所素有今吾與裕又宗達摩者而裕也學贍而材博且方盛年豫懼其溺於文而不知所返玩華而喪實無乃有負於吾宗耶故因其字而針之其針曰儲藥于肆嶽增川委疾而療之刀圭而愈道之淵博如江如漢愈涉愈遠心悸目眩不有至人勦其枝蔓如臨濟玄如德山鑒裕也多材只益多岐約之約之其必如斯而已明善針為陳氏作夫性之善充乎至仁如天元氣與物為春有萬不齊流布無垠大包六合上縣星辰霜烈霆怒隂伏陽信時之禎祥而生鳳麟亦有虺蜮𢦤于生民椿壽菌柔百卉榛榛土滋群植海嶽潛珍誰其司之變化如神心先天地大哉惟人出入萬有往復如輪由己所業報施相因隨業而異其性則均有邰生棄嵩嶽降申維德弗類動合道真堯舜之聖象宋傲囂羊舌覆宗若敖隕身為彼𪧐惡化弗柔馴粵若衆萬總總詵詵不有先覺匪教曷遵若虞機栝其發千鈞止水有波明鏡忽塵永復于初光明日新涵養之熟純粹以精徛與陳君信行振振宇以明善爰咨爰詢為德弗怠百祿是臻詩以告之無謂譫諄誦而弗替請書諸紳元履針為臺郎高君作有序少師姚公嘗命高氏兄弟十二人之名若字復申其義為之序豫所交者曰絢字元履文而賢故獨美之作元履針身欲所至履之以足心有所詣颷馳電速不虞于蹶或蹈之谷周旋以規如轂於輻布武千堂四海揖讓詭遇疾馳以得為喪由禮而動惟顏是詔帝惟女歆陟降左右高氏多才履也尤賢有文几几既秩而間爰結其綦載揚其裾坦坦周道何天之衢𮚏妙法蓮華經𮚏有序三韓桑門心竹遊京師市白金以書妙法蓮華經既成寓書吳僧子梅曰吾茲不易以豫有高行敬以遺子然江南氣蒸溽必緘諸笥遇庚伏則發而曝之拂以纖纊毀焉梅受之如所誡以歸于肆經之臨安淨應院又懼後之人不之祕惜也介道士張一無求豫識其故梅號雪谷嘗夢人有𪧐讎抉其舌斷之且起不能言遂瘖禱逾年復語慧辨過人益通梵語豫未之識聞一無云一無素謹願其言可信然系之以贊曰大聖作神龍躍其施博咸乘時善其機勇有為彼慢者呱弗乳背厥母聖之天冥化權喻以蓮𧤏爾菂茁者蔤卒若一孰似之德無疵詔來茲匪金銀堅不磷徛若人兮摩騰竺法蘭𮚏有序按周書異記載西方佛生及終之事而列子亦曰西極之國有化人來穆王事之作中天之臺其高千仞及秦時沙門室利房等至始皇以為異囚之夜有金人破戶以出又霍去病過焉耆山得休屠王祭天金人以是考之周秦西漢知有佛久矣特未廣其教於天下也至東漢明帝始以夢感因傅毅之對遣蔡愔等使西域求其道而摩騰竺法蘭亦先自天竺來由此經像大被東土固佛之縣記必時至而機熟然非騰蘭與此土人有大緣契疇克爾耶有以二大士像示豫者謹再拜而為之𮚏曰日之方升照有先後或隱或曀非日之咎伊昔吾宗自西徂東屢出屢沮時之未通在漢永平格于帝心遣使求之維遵與愔粵若二士作如來使有馬翰如負經以至如彼旱暵時雨乃作沃我焦壞是刈是穫人道之貴在於明性百家異説孰不自聖匪小而偏匪蕩而窒不有大教道幾乎熄去我二士復逾千載龍藏之文浩若河海匪津匪涯誰與𦨞之豈無綱目孰能張之孰圖二士顴頰方眸欲挽其袂逝從之遊妙有堂𮚏有序三藏大法師居京都聖眷甚篤王公大臣就而論道者日以十百以國朝輿地之廣萬方畢臣遣使朝聘風俗語音之不同其司賓臚傳若古之曰寄曰象曰譯者視百倍蓰而師悉通之歷事五朝皆授官一品古澄什蔑以過也而退處一室泊然作堂曰妙有取諸經所謂假觀者立一切法雖萬象森列一念空寂而證以不有不空即常絁待即師之禪觀三時者也謹為之𮚏妙有之堂毗耶之室不假不空非顯非密默而恆照用而恆寂太虛一塵萬古一息天人來參華雨如積五竺之西大荒之北九譯獻琛有萬諸國師發其祕相顧而失再示之訓充然有得曾是大邦篤生其良于耀有章鼓鐘于鍠壽我聖皇邦家之慶作我𮚏詞無愧斯堂玄卿𮚏有序臨江潘雲谷善造墨至順間之京師翰林虞伯生見而奇之先是朱萬初以墨進文皇勑授奎章閣直長伯生欲奏潘代朱潘辭以親老願歸養於是一時名公益奇之作詩文贈者亡慮數十篇潘若榮其歸因語人曰吾與墨若𪧐好為之幾四十年而伎窮於是矣時至山谷擇松之膏馥列炬然之覆以密器復穴傍以泄煙使傳數器而後煙始清彌日夕忘飢渴而所取僅銖兩法用金珠貴劑搗和使久益光潤吾貧無有至鬻他器物贖之不靳也故吾墨不多得庸富人欲高直求售吾不辱吾墨使屈見之吾固不負墨然吾無它能四方識不識咸以墨知吾名而墨亦豈負吾哉愚謂潘之於墨能勞以終其身費至於破産而不二其心蓋遊於藝而進乎道者也其承蜩文入輪扁之徒與世之士君子口誦仁義及臨事則悖所學與吾徒業稱傳道而志之專守之固求若潘之誠於其墨皆可愧也於是作玄卿𮚏以遺之陶以世易穎也日遷可久可速惟吾周旋丹鉛後來或居吾上亦有繪事頃刻萬狀吾傳忞忞千里覿面以吾記事巧歷百萬有文庚庚麗于日星時致雷電蛟鼉夜驚我匪知玄智出玄下尚忍磨磷齒髮日化堯卿御史豸冠像𮚏服以彰其德而服之維稱也冠以著其法而孰于于正也儼乎其若思則如廟如郊而敬也嵩華千尺鑠白日而烈秋霜也與物同然而海涵春盎也運衆輻於一轂而納萬象於一鏡也固天將利其器而徯以康斯民而司王命也王道人𮚏壯遊江湖晚歸田里仕而知止富不求餘得非藏利於鈍而用智以愚與物浮湛隨時卷舒閲今古為夜且以天地為蘧廬譬之雲霧不雨物自沾濡璞玉在山草木光腴故吾嘗愛王彥方馬少遊之為人猶未若龐蘊李通玄之達識而公則庶幾其徒也趙宗吉御史豸冠像𮚏稼而穡期豐積邦乃足食源之長其流湯湯為湖江有文郁郁學以篤之既仕而祿何以告之冠豸之峩其容有思舉其職以藎王國王國有待維楨維藩克保克任式無爽豫言蒲室集卷之十五目録銘集慶路天禧寺講堂鐘銘集慶路天寧禪寺鐘銘集慶路崇回禪寺鐘銘板銘龍河廣智菴鐘銘板銘天臨路開福禪寺鐘銘集慶路定林寺鐘銘饒州路安國寺鐘銘廣智菴三小鐘銘二罄銘寧國路崇教禪寺鐘銘湖州路資福禪寺鐘銘寧國路珩琅禪寺鐘銘建昌路福山寺鐘銘銘存存齋銘近思齋銘敬學齋銘魯山銘定林住處銘頑石銘書𭘧軒銘臥雲室銘祭文祭中峯和尚文祭鄧善之使君文祭照元晦文祭信南海文祭徒弟知津文吊鎦忠憲公文祭穎侍者文祭徒弟行宥文祭徑山元叟和尚文祭高獨峯文祭瑛石室文祭徒弟寶滿

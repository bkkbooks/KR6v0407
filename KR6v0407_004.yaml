body:
  text: 豫章釋大欣笑隱律詩五言佛智師歸仰山早發扶輿拜鐙明愛白頭故鄉元自好游子獨淹留壯業真何用孤懷未忍休始終存衆望不敢畏離憂送張用鼎游燕南天上知名久由來漢客星江湖歌白雪風露滿青冥巴蜀須傳檄燕山待勒銘壯夫期遠大不獨抱遺經寄皇甫州判三首吏隱風流甚高懷似野僧八分秦畫古三尺漢官能止水心無竸清秋氣欲增扶搖如有待萬里看飛騰錫谷泉無比青山亦可人試茶招野客拄笏及清晨平野牛羊臥空庭鳥爵馴學優為政樂風俗見遺民講罷長于寺牛頭取次游秋風三載別滄海一身浮擊鉢隨漁翻經滿石樓故人知我意書札為相次韻寧宣尉將門三葉貴古劒削霜硎霧卷鳥蠻淨風生碧海清投驚甲帳飛墨動雲屏未愜清游興松房𦗟雨聲送別二首行役何時了宗門可罷參拪遲無杜曲留滯尚周南渡水聞天磬登山禮佛龕百年重回首風柳正𣯶𣯶沙鳥高低語江雲斷續飛青山携手別秋日故人稀落落芳心在悠悠昨夢非歌長不用續鯨浪暗吹衣趙大年小景斷葦仍摧雪寒潮不上溝扁舟從此去一衲更何求望遠支倦臨流照影羞披圖重有感空負五湖秋送秦元之參議赴太禧宗禋院二首聖皇思孝治禋祀答鴻𨤲文祖尊虞典祠官肅漢儀嘉言資畫諾直道在維珍重如金玉山林尉所知臺省東南重俱稱幕府賢人誇冠有豸我愛茟如椽行李江東月離觴柳下筵春風遺愛地振粟萬樓船送人奔父喪二首銜訃奔程急秋陽晚作威馬悲循道踊烏感傍人飛遊學期身達哀榮與願違始終全志養德業足光輝死生千里別父子百年心淚盡黃泉咽愁來白晝隂雲山通楚回江水入淮深墓多祥應它年惠好音寄趙伯寧中丞八月草一日人于趙伯寧中丞書其日趙初度遂寄詩二首趙與豫同生甲申也早忝相知舊山林愧不才生申同八月雌甲異三台鵷鷺龍庭會風雲玉帳回遙知初度日宣賜紫霞杯新寺承恩重深慚燕爵微寶階華散綺金地月增輝布畫勞鈞軸經營識化機西湖風雪夜還憶對麻衣答張雪峰司農二首𪧐衛千官直明公列上頭露華金井凍紅葉石渠秋分職農司重為邦食貨優不忘方外興書札到林丘營繕勞供億推忠答聖恩玉泉上林𫟍金地給孤園華雨看還眩星河坐可捫南宗猶借重不惜問風幡庚午秋過淮安百感何嗟及行人過楚州笛聲今夜月雲物向時秋古驛依城住長河傍海流天王南狩日曾此駐鳴騶過淮河口水次千家市蠻商聚百艘揚徐元接壤河泗此交流乘傳陪天使浮杯任海漚夜凉瞻斗柄想見上林秋送薩天錫照磨赴燕南憲幕蕭寺留詩別高懷不負公江聲元自急山勢古來雄下榻踈鐘雨登臺落木風重來無幾日除道避乘𩣭送蕳上人有序分院官按行吉安諸山取妄庸住持十數人革去令蕳持咨赴行院投之蕳求詩贈此千古象龍地凄凉狐兔居固應韓子論無復仲靈書使命文仍重宗未疏煩君馳檄急感激壯懷孤蘭蕙同芳圖為馬元博題其兄伯庸為三臺中丞元博御史掾時人榮之比德宜君子同芳伯仲間舞風長佩委笑日淺眉灣蕙帳懷幽遁蘭臺接上班國香應自媚容伴玉人間挽陳如心縣尹自昔稱人望寧論祿仕豐平生太丘長今見魯山公顒若思時雨薰然被德風承顏空有夢長與逝川東楊執中幼與豫同舍自豫去鄉里一別四十五年矣乍見俱不相識承惠詩二首次韻謝之勛業雙蓬鬢江湖萬里心扣舷山月近欹枕夜濤深多士懷東觀何人賦上林只將弦上趣白雪𭂁遺音青襟巷南北雞犬識比鄰驟面初疑夢論交晚覺親文章元有命耕釣豈無人老矣非吾願滄州合問津次韻奉答吳可堂左丞致政寓九江見貽晚節陶元亮平生賀季真雞豚栗里社賔客午橋春風物三生夢功名百歲身種蓮母負約金地不生塵送睢陽王德明辟內御史府掾巡遠睢陽後遺風士氣豪河經商邑壯山並閼臺高月窟求龍種天池集鳳毛𪿢書寧易致不用歎賢勞蒲室集卷之五目録律詩七言萬歲山黃河阻風高彥敬尚書墨竹送郭幹卿學士赴奎章閣次韻趙魯公二首次韻王繼學侍御金陵雜詠十首新到建業二首龍翔寺君子堂東窗看山忠勤樓重登忠勤樓獨座君子堂賞心亭潛宮為餘姚同知賦林泉次韻馬昂夫捴管飲仙橋詩贈王吉甫提舉次韻吳間間宗師贈茅山徐真人次韻薩天錫賦三益堂夫容次韻王伯循僉事將上江東留別子昂竹石眉壽堂為趙子威照磨賦次韻馮東麓侍御游鍾山東麓侍御赴燕南憲使留別次韻奉餞送太禧宗禋院照磨觀志能監造御還朝謝郭道淵以詩慶住新寺次韻答曹德昭臺郎次韻曹德昭答呂仲實僉憲三首仲實復和見貽勉答二首和張夢臣侍御題東林李高士西詩卷二首送張可道管句赴西臺雪窗蘭送趙仲德歸國學受業兼呈其父宗吉待制送笪子敬赴蒼梧尹送韓九成臺郎赴中臺送趙子威臺郎還都送楊文舉赴江浙省宣使柯敬仲墨竹二首敬仲作枯木竹石寄樵隱御史命題其上謝張雪峯司農惠西域珍果二首次韻張夢臣侍御太子千秋日燕龍翔寺李遵道墨竹二首王元戴御史為沈禹錫畫洞庭圖

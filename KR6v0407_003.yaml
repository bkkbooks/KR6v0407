body:
  text: 豫章釋大訴笑隱律詩五言送趙公子去疾侍平章魯公㱕蜀所羨還鄉樂茲行得侍親魯公黃閣舊宣詔紫泥新給傳舟車備承筐玉幣陳會靈奔岳瀆移次動星辰父老懷遺愛朝庭眷大臣百年輕重計一舸去留身子軄共承重親知囑諭諄行庖供膳早張燕進觴頻寶瑟調銀甲琱盤鱠玉鱗雲林還吊古風物獨傷神地勢金城壯山光錦浪勻江喧初上峽樹遠欲通秦牛女天河夜魚龍野水春豐碑臨奰眉高撫麒麟側聽歌淇澳猶聞起渭濱上尊羅甲帳仙仗擁蒲輪朽櫟依瓊樹飛華戀錦茵峨眉尋舊約谷口卜芳隣願𦀽香山社終陪綠野賔相期無遠別萬里月随人次韻張夢臣侍御游蔣山五十韻勝遊還送客秋日淨郊原別酒歡逾洽行廚禮不煩楓林生晚吹鞠沼媚晨暾滿座金貂貴斯人玉雪溫𮈔綸承異渥黼黻進嘉言宥密皇猷重才華大雅渾披雲簾挂玉前席錦為墩接武夔龍地冥懷鴈鶩村外臺分重寄南服占名藩登麦初橫榻迎春及賜旛馮高荒壝汶吊古断碑昏種竹期招鳳尋僧共𦗟洞呀獰蟒化海立怒𩿾鶱珠鈿沈井金鋪委壞垣國初遺老在江表故家蕃及物多膏澤為邦固本根化行民自信身退道彌尊羙俗時丕變吾人溺可援山川還寂寞歲月去翩廢舘弦聲絁虛龕繪像存苔班飢鼠走梅臥野蜂屯除道看𩣭馬來儀集采鸞傳呼驚鹿笑語荅江喧撫跡多遺恨懷人欲断魂馭風寧有待斲堊妙無痕師表儒林盛賢勞王事敦不求金躍冶但愛土為塤陳寶徒祠雉桓溫苦化黿青山随地好朱實著霜繁充味和椒桂同馨佩芷蓀衡廬肩可柏參井手先捫說劒雙龍吼揮豪萬馬奔築臺先自隗學圃耻如樊破衲多年冷窮檐傍午暄不才甘朽櫟何幸枉高軒蕪穢煩芟刜泥塗頼力掀班揚鋒遠避屈賈氣還吞舉世懷燕石惟吾重魯璠三光開渾沌萬𣲖出崑崙喜接東山屐叨陪北海罇辱知榮篚帛懷德報飱多稼欣逢歲嘉蔬更滿園雲霄翔鶴溟渤偃鯨鯤寒士勤噓拂諸生淑討論望塵趨末路立雪候重閽緣忝三生舊心冥萬化元棠隂思召伯柳色憶王孫精衛慙填海神鼇力負坤他時愁遠別此意竟難諼嵩華相從去重窺王女盆述懷送觀空海歸臨川七十韻幼慕空門貴高𨂙世可遺功名輕閥塵土豈磷𥓲澄觀難居俗湯沐不癈詩三生猶有習四海豈無師身去江湖遠山空雷雨垂諸方驚老𪧐同舍走群兒素昧平生願居然會面期觧牛須肎綮相馬必權竒壯業期軒輊新功日蓓氣豪空虎穴戰勝失魚麗五載靈谿寺千章白雪詞清游忘且暮物論不瑕疵奎畫前朝祕清霜古佛規巖空孤有山古寺無基松燎供霄讀芹香助午炊凍泥蛙似蟹春雨菌如芝遠客愁𤠔狄村童枹鹿麛雲藏吳猛廟雷護柳公碑物色紛難數雄林應接疲願終盤谷隱耻事北山移未覺歡娛盡深蒙造物私寒巖徒刻畫元氣忽淋漓共喜師門盛何嗟友道睽青山吳甸沒白水楚天涯落日三年望浮雲兩地思驛書勞白雁貞信卜玄龜果爾期雞黍同心感銕鎡群公來襍還餘子去委蛇風日矝神駿雲霄刷羽儀古今存道統師友得維今代誰潛子宗門一器之聮芳端不忝清要合如斯自許奔流象何知測海芟夷開樸樕洗滌脫瘡痍吊古多閒暇登臨甚忸怩山河秦百二宮闕漢杲愚黃壤侵銅狄春風動兔葵林俱異物標晝不同時志大交難合歌長聲愈悲近人山擁座照席月臨池正擬追金玉方將脫𮩸覊不才還涉世中道遂分岐相失嗟狼狽無謀哂鷾鴯交情淡於水真味羙如飴衣綻寒分絮囊空遠貸貲鴒原兄弟急犴獄簡書疑仁者應無敵將軍自數竒波濤孤梗汎風雨一巢危亡命憐張儉逃生愧范睢百年俱繾綣千里許驅馳誓欲同生死那能顧渴飢推恩豈望報菲德竟何為吾道縣孤注藂林失一夔老師甘屏棄弟子頌期頣逝水㱕東流光及崦嵫空餘匠石斲誰善宰夫胹行獨招群忌名高得謗随長鳴悲病鶴老氣臥孤羆入室猶橫榻承顏或奉𠤷樓孤金驛遠河直玉繩欹未猒從師樂其如念母慈江雲連䆉稏山雪濕茅茨短世驚炊𥞫成功付覆碁何曾犀首貴空作虎頭癡白日真成去青春有別離風烟辭北固江漢抱南箕浪穩饞蛟睡天長白鳥遲鄉𨵿迷遠近雲樹暗參差幸喜收蠻獠千今靜鼓𮝪詩成須數寄清響播塤送宋誠夫侍郎福建注選㱕朝已見崇儒效端由取士優涵濡知聖化啟沃待嘉謀歷以諸難試旋聞百癈修分曹仍領選南省且停騶齊相門難掃山公啟可投炎荒逾嶺海東極控閩甌水鏡明群象銓衡列九流人期修乃職吾欲其亢分寸躋難上錙銖細莫収匪帷公論合若應眾心求六翮雲霄闊脩鱗窟宅幽乾坤生物大雨露化工侔紫詔頒宸極清光動冕旒天高烟嶂淨氣肅雪霜稠高盖相迎候遺經得校讎人材臻盛世文物並中州公已多遺愛誰同紀勝游清商金石奏㱕思繭𮈔抽蓐食愁征㒒梅蒸弊裘諸君懷感激短景惜淹留愧我同樗櫟勞生甚贅疣断蓬風卷絮破屋雨傾湫烟水蛟龍暮江湖鴈鶩秋銀河斜斗柄雲海限𤅀洲待月飛金錫因風駕玉虬天台無負約為我訪閭丘送何彥敬赴山東憲幕風物中州羙人材聖代優恔恔光岳合肅肅羽儀脩省署千官盛臺眾目収諸公多汲黯文椽獨何休徤茟回天險精機洞鬼幽奔群蟄奮鼇負五山浮貴已常存恕知人庶寡尤平生周禮樂後世魯春秋西極銷鋒鏑坤維得綴旒元功推衛霍首罪竄共兜陳寶無祠雉挑林已放牛九天行日月一命重山丘幕府非間散山東且勝游飈車馳羽檄霜刃避吳鉤白下諸侯酒准南使者舟風清捎退鷁月冷動潛蚪歷數無雙士誰為第一流託交慚素昧道術得相求塵土緇衣涴山林白髮羞送君因有感暮色起滄洲送暉昧谷歸蜀西土稱多士吾宗代有賢百年罹未運三蜀竟中捐江漢情悽若𨵿河氣薾然重來天下士忽見國初年日月臨雙闕星辰共一天人材端有合地勢豈云偏今代誰名勝斯人亦靖專鵷雛文翮健驥子肉驥拳濯足思滄海浮桮動碧漣池魚知法要山兔學深禪行李元無住飄蓬也自憐登高群木下吊古大江前猶說錢唐好徒聞銕甕堅英雄銷鷙鳥蕳牘謾蟬聮故國雲千疊新秋雨一川江風今夜急巴月向時圓鴈𧻍傖人笛鴉迎賈客舩出潭天似束入峽水如縣久駐邦君騎爭輸邑子錢雨華知滿地鐘鼓報林泉完者䔍捴管瑞麦詩白下農登麦民歌秀兩岐樂郊原膴膴化日景熈熈膏澤均千里薰蒸足四時舜琴方日奏鄒律恊期吹玄測猶存象休徵不待龜誠通天自應氣感物無疵紀瑞農司喜披圖太史知聯纓珠的皪雙佩玉葳蕤𪧐雨含芳鮮飈動綠漪鳥嚶金羽並雉雊錦雲披充市邀湯餅比隣餉糗餈丙丁先薦祖庚癸免呼師翁飽支頥睡兒間鼓腹嬉不須秦貸粟無復魯憂葵子產多遺愛張堪匪溢辭頌慚連理木歌忝九莖芝仙李彌蕃衍甘棠願𣱵思登庸期爕理布治待維展也風雲會懷哉雨露滋思文尊配稷洪範遠傳箕王道惟㱕極民心貴秉彛來牟存古典貽訓可無詩送鎦文羙知事赴燕南江陵初扈蹕忠義可回天代𨚎朱虛重南陽鄧禹賢揮豪當白日舞劒動華筵宮錦紅雲暖金盤玉露圓古來三語掾今代孝廉舩無薄燕南幕相期日九遷蒲室集卷之四目錄律詩五言佛智師歸仰山送張用鼎游燕南寄皇甫州判三首次韻𡩋宣尉送別二首趙大年小景送秦无之參議赴太禧宗禋院二首送人奔父喪寄趙伯寧中丞荅張雪峯司農二首庚午秋過准安過淮河口送薩天錫照磨赴燕南憲幕送蕳上人蘭蕙同芳圖為馬无搏賦挽陳如心縣尹次韻荅楊執中二首次韻奉荅吳可堂左丞致政寓九江見貽送睢陽王德明辟內御史府

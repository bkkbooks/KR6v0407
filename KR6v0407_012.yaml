body:
  text: 豫章釋大欣笑隱塔銘永嘉江心寺一山萬禪師塔銘代佛智師作豫景定咸淳間與一山往來浙東西率不相離離或不歲月終必合及東禪師來南屏豫掌記又推擇一山使代已而南竺絶岸湘公先隂使入以客召一山至則令衆擁授前職曰士而可以計取耶遲一年當復我及期而歸卒掌其記時上竺佛光以齒德位望高一世猶降己與交其它之大方有衆千百皆未足多如得一山為旬月客若頓光几席德祐間因遊天台執別曰子其寒拾乎及境衆留主寒巖未幾遷紫籜十年遷踈山與當道議不合即棄去時豫亦菴居于洪一日有厖眉負笠走雨中來就之乃一山也留數月歡甚而江淮捴𮈒會諸山于靈隱之直指堂議以開先迎居之一山益奮厲以古道自任庶幾禪林全盛時又十年行宣政院具疏幣以永嘉江心來聘至之日龍出光怪群烏翔而不去人謂宜有吉徵已而廣蜀雲南窮髮之學者卿風大至居三年院吏閲舊藉謂有一字可出入其過者以諷一山笑曰吏姦欲竭吾帑庾以塞溪壑吾不為也必有直以吾位為奇貨者吾其行矣衆數百隨至馮公領度終無留意各泣別散去悲聲答林野一山即躡屩獨往惟其徒克恆背一囊㒒伇無一人視之若甚窘然而自喜如新去桎梏方笑傲恬不為去留訃會廬山月澗明公遣舟迎歸東溪且從容言復以開先歸師又便欲去乃止不敢言後明公歸番示寂開先之衆懇逼至再四願不以寺務纍師惟乞訓徒凡一時名士爭願出席下其它師之弟子雖抱奇蘊勝皆自不慊蘄一語相𮌈諾始若厭望然牧衆餘三十年道足不愧古人而受命綱吾宗者率視賄為好惡故一山起而復仆不得大行其所欲為豈在己者可勉而在人者不可彊與嗚呼一山化之先七日力疾危坐不近藥至期命具浴更衣出據室几速兩序進書訣衆語置筆問不應撼之息絶逝矣皇慶元年十二月三日也闍維收五色舍利如菽不可計雙目睛不燼有司鎔以烈熖經數十返益晶熒齒牙頂骨錚有聲時改作豫章烏遮江西行省丞相斡赤命以舊藏釋尊舍利奉於中而遣使分一山之目睛舍利貯之銀匣陪葬焉以七月大會萬衆迎歸歡泣交動餘骼舍利又以葬東溪舊與南州珍公同里因同竁葬之三年克恆走錢唐乞銘豫以徑山罹禍方塞𨵿絶客恆堅不去謂它無能知吾師者豫恐即死忍不使一山行業暴白乃書以授之一山諱了萬字無竟族臨川全氏生淳祐元年十月十四日瘠而弱年十五業程文有聲然無嗜俗意去從金溪常樂院思仁祝髮俄有靈芝産戶樞及游方謁偃溪聞公荊班公簡翁敬公皆相語合後經神祠見紙灰隨風旋起者脫然忘所證丞以白東詰之終無疑洎開法竟以嗣肖焉而辨博過之常瞪目坐不以文自溺至有求輒纍百紙落筆立𥁞雖誤終不易或應變縱論袞袞萬言不窮録之皆成章人欲𪧐搆終莫及卒時年七十二銘曰凡物之終得喪惟均孰計其初時之詘信有𮦒其實人棄不食後時而思於實何慝師有至慈萬物一己如保焚溺嗟嗟赤子庶幾善導其如蠢蠢彼聖之世尚曰堪忍有覺大雄胡乖而逢遲子同歸夜光瞳瞳昭箸日星龍鬼撝呵無或不暏如睹者何金華智者寺雲屋間禪師塔銘代佛智師作括蒼松陽葉氏世多名人其尤顯者唐開元中有諱靖為老氏學宋大桑門雪堂行公與石林先生夢得為三賢里人至今祠之自雪堂後族秀民多為浮圖氏而尤顯者曰雲屋諱自間遡雪堂九世諸父也九歲伯父古鑑皎公使習經如素誦季王父古樵宗公謂兒異使學佛能輔教俱大也攜入福安院十三剃落隨樵居婺之仰菴厚自韜韞已無涉世意雙林明分石見謂是子異日風穴老南也滯茲樵遣參荊於冷泉使侍香辭匿入淨慈石帆𠉶掌記復辭暨東至迫使就前職撰成道疏云發見精於午夜易發為泯因汗下股栗如撤蒙蔀已而省部有知師名者舉住江右九仙寺檄至以母老辭歸婺作景睦堂便養堂側有法明寺因寄築焉榜堂曰萬休至元癸未郡以雙林廢倚師中興彊起之說法嗣東五年棟宇完帑𢈔實即引去歸萬休十年智者寺住持友竹素又舉師代已卻避凡七月乃應與恆山周齊交相好郡守為築二老亭山中李雪菴鮮于伯幾作圖賦詩落之憲使梁公又搆草堂寺側大德甲辰因謝事居焉宣政院復以江心起師辭老不任更以其友一山代之皇慶壬子十月草五日與客語笑如常時客退命左右進筆書偈與衆訣遂終遺戒三日葬草堂後龜山先是自為銘息齊李公為磨崖書之壽八十二臘七十生宋紹定辛卯六月二十日有外集二會録若干卷其徒可則謂師之銘不及其系請詳志之豫與雲屋臨川萬一山雅相厚逾五十年二兄同年卒豫後死者忍銘耶又義弗可拒乃銘而系諸辭曰維括之陽天作其區其良䔍生大不居神眷有德而卒𢌿豫孰彊豫宗賈勇萬夫師有立言矦公氣沮曰匪吾事庶曰禦侮擁幢大方人榮袞黼師居不寧式歸將復恫于道如任弗克惎彼學人有來如驛有辨雲興示之默默或恃其盈我以無得胡濬其原胡嗇其施亦既壽𦒱亦終化儀可拜可瞻龜山之石孰睹其真茲焉其跡金陵天禧講寺佛光大師德公塔銘代趙魏公作東漢佛法入中國而佛之遺言莫克大𬾨唐太宗時有弉法師者躬往身毒求之得經律論歸授其徒窺基為箋疏釋之世傳為慈恩宗云國朝以仁慈為政䔍尚佛教又益信慈恩之學先是其學盛於北方而傳江南者無幾至元草五季詔江淮諸路立御講三十六求其宗之經明行修者分主之使廣訓徒時東昌德公首被選世祖召見賜食與衣奉旨來建康住天禧旌忠二寺日講法華唯識金剛華嚴大疏等經三十一季又賜號佛光大師師既善講說又能力行故人䔍信之每施戒人父子兄弟相教犯至然頂為誓且願出財力新其殿廬樓閣初寺廢僧星居如逃亡家及茲大有羡粟歲饑為食道上活殍死數萬流俗尚醪醴相雅好結官吏師獨以律繩其徒令先自謹出止坐起有常度若韭薤蒜䓗酪乳辛葷等咸蓄食凡物之屬於公者勿毛髮互用誤一罰十故者𢷤久之皆化服徒無犯令自居建康三十餘季一布衲皮履終身不易午過不食夜危㘴逹晨以苦誦讀𧈡喪明忽夢萬僧迎居高坐空中散華如雨覺以語人因示微疾猶誦經不輟頃之安坐而化至治二年二月七日也季八十八置龕草有一日顏如生以法闍維獲舍利無算會者數萬人為塔葬之江寧縣張家山之原以行臺居建康凡仕於南者多鄉師高行願受一言為弟子金吾上將軍事師逾謹以豫章大欣之狀來謁銘孟俯嘗待罪世祖朝見其用人天鑑莫測雖方外士皆雄偉桀特若師能弘其教亦一時之選也是可以銘己師名志德號雲巖姓鎦氏世居般陽萊州掖縣後徙居東昌而師生焉十二授經於順德路開元寺海聞禪師嗣法於真定龍興寺法照禧公而嗣其法者某某凡若千人銘曰於穆聖祖如天之臨維佛大聖克協帝心帝心於人一視同體設教多岐趨善一軌佛光之道聞于朔方受命于南隂𮚏時康乃升高坐乃𦒱鐘鼓以誘以諭有來如雨內默斯照外應斯虛往復無朕寂用一如境變萬殊其立也獨匪留而久匪逝而速長于之麓牛首如伏後人是瞻于曰不足孰圖師恩刻石于原維其似之庶幾不泯臨川資壽寺妙行慈惠大師聰公塔銘有元延祐四年十一月三日臨川妙行慈惠大師卒卜明年某月日葬其徒來謁銘乃諾而系之師諱繼聰字愚極族王氏以宋寶祐年五月十三日生生十二從資壽寺本椿宗定為驅烏十七給文思院勑牒書名以嗣定之徒自壽景定初椿定亡江西常平使者并籍寺田衆饑以散師獨走大府直之凡七年漕使方公逢辰得情悉取奪田歸于我師葺寺又益田以紓公且驟施于鄰居室雖乏匱常若裕雖豐若未始積也日誦楞嚴法華又樂吟詠凡圖緯推步之術岐伯俞拊之書咸無不穿穴有以南安能仁寺請出世固辭不就自始受具迄是無缺行凡六十季年七十七先相于寺北之雲溪期與徒紹明同藏明有徒三人長嗣德德授宗善善授法觀觀授惠辨次嗣徑徑授守約約授法舟季嗣徹徹授守悅宗支以蕃惟徑善蚤世約博學通宗主項山寺銘曰世貴有後而懼不祀孰是吾宗重若傳器師智克荷度德敏事奮古風生敢抗大吏胡賢而藝而不昌于世道充其身而不淑諸人嗚呼尚𢌿爾後昆以識其丘原臨川資壽明公和上塔銘公姓彭氏諱紹明字無昧撫之金溪儒家子季十二輒不喜與俗混居於是去學佛于臨汝資壽寺宋景定甲子從妙行慈惠大師祝髮為桑門莊重蕳默善誦孔雀佛母經入病從師禱祈輒差以故里人爭相邀致雖甚遠且無所施與終不辭或少得施悉以資寺為繕修費餘以貸鄉鄰之困乏者及視所居室枵然衣敝不易尤喜客之𥁞歡雖彌月如始至又致儒師以訓其徒若守約法觀守悅皆以能文辭游禪林先是官籍寺田慈惠以狀白府及部使者凡七年始克復公時行貸以給其費自侍慈惠六十年雖老益敬畏慈惠自始疾至病必躬醫藥凡歲餘未嘗歸私室及卒哀至絁比殮及葬不少離次自是神志日耗戊午春病噎氣逆禱曰願貸須臾死使奉師歸藏十月葬慈惠明年疾甚即不餌藥五月十日坐起如少間撼之目瞑矣其徒嗣德嗣徹守約以其季十一月某日葬雲溪從慈惠之季七十有五始寺之徒以傳次相授受至公乃𣲖別為三雖各以宗傳而若一終無異言守一先一歲卒銘曰童知訓誦里無勃磎以有𪧐老槁項厖眉談笑寓物物無遺者復我侵疆築室百堵有徒雍雍波趨雲從匪承于代亦寄吾宗吾宗之寄有肖無類茶陵何人端也嗣會惟約與觀載唘其途于日千里敢昧厥初蒼山如城其流環外我瞻雲溪雲木茷茷猗與後人無念爾猶不有過者拜此道周豫章般若寺絶學誠禪師塔銘宋季慧朗居仰山法席特盛由其門出據大方固一時麟龍其遁跡巖穴若高峰𨺗崖鐵牛亦足追蹤先德後高峯以𫝊斷崖中峯而鐵牛以傳絶學又皆道重海內它宗所不及也絶學卒十年其徒智玄以番易㑓之狀乞銘其塔師名世誠吉水人世鎦氏生宋景定庚申十二月二十四日年十七宋亡兵草甫定家無所業諸父迫使從商不樂也行寓興國大冶三泉山有異僧無相者通𪧐命見師呼曰昔黃梅山同參能記識乎師然無相勉之學佛以還舊習師即棄所資從修禪定忽聞鐘聲有省又教以出神師曰神往形存苟人舁致水火神返將安所寄知不足學棄去登臨江之西華山求祝髮春山宗公與語奇之謂真顛雖沒而肉身猶在盍拜之以剃落焉久之游衡廬間留圓通石霜瀝指血書法華圓覺以助精進入吳見蒙山異公及菴信公且遍叩海上名宿所至莫嬰其鋒而自以未饜所志復歸里見𨺗崖戒公值其臥疾猶以偈戒卒往謁鐵牛定公于湘南徵詰數十返始嚗然如釋所滯遂留分坐期𥁞磨礱以卯所證乃去至大初過洪之靖安愛其林𡎙幽勝有凌景仁昆季即靈鷲峯築菴曰般若相傳馬祖嘗記五百歲有大士來說法咸謂師足當之生米市鄧實齊亦舍所宅為菴以奉師師往來居之出無與㒒儲無甔石而化茅茨為廣居從之嘗數百人敝衣槁項溷處樵蘇言無緣飾或有所訓無切督之威嚴厲之色而聞者拜稽相然頂指誓以勿犯若公卿儒老異教之士與西域高麗雲南日本諸師亦嚮風趨慕耄稚扶接踵于道至家繪其像祀之每剪瓜髮或墮齒牙則爭取藏去皆獲設利至順壬申十月草三日示寂春秋七十三僧臘四十有二度弟子若干人奉全身以沙瘞靈鷲峯下後三年出視之貌如生瓜髮眉須皆長寸餘飾以香𭰖迎置于堂礱密石為塔而四闢之以尉其徒事之猶存且刻銘其上焉豫聞師之教人專修乎內以明夫自性性之常定雖虛空可壞現在身心皆為虛僞况於後取其棄質以為實有無乃戲事而於吾銘何有哉又惟妙化無方靈機莫測故臭腐可為神奇柔脆可使堅固世有佛指齒骨諸祖肉體皆歷數千載而鮮瑩剛潤有足徵信將嚴像以崇其教立言以寓夫道而銘不可無也於是不辭而𢌿之銘銘曰硅峯如壁泐潭千尺師據其衝氣當勢格廜㢝如萬象為徒古有其人南陽大珠太方萬指虛若閧市仰只高風心悸顙泚大用無作至道無言寂若槁木而應無垠惟師法身非小非大孰云委骼而亦不壞刻銘塔波金石不磨死生之畏其如師何其如師何姑蘇萬壽寺默翁一禪師塔銘道非語默胡求其迹作於無作無任智力大化成物雪霜雨露生死變遷人之大故獨無怚化旅泊傅舍猶餘光怪海天不夜海若弭節九峯龍趨電擊雷驅文龜長魚示爾來學𥺤若千鐙庶幾不已我銘是徵蒲室集卷之十三目録說冲默字說開通叟字說繼齊說靜隱字說江山小隱說題跋題文宗皇帝御畫萬歲山圖題左明德刊施金剛經後題曾師祖北澗禪師方中字說後題曇西竺母李氏墓銘後題高氏守拙詩後題東坡與程正輔手蕳題癡絶禪師書山谷煎茶賦後題東坡手帖題松雪翁書千文後題殷濟川畫題思聰遺墨後

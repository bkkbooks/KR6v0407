body:
  text: 豫章釋大欣笑隱絶句五言米元暉江山秋晚圖二首紅樹宜秋晚澄江媚落暉扁舟如喚我莫待白頭歸江山自開闢元氣忽淋漓貫月長虹夜涪翁許獨知松雪翁墨蘭風佩參差倚秋香暗襲豫愁來禁不得誰吊楚三閭畫牛草暖犢子肥牧間牛耳濕誰知荷簑翁風雨租稅急溪山小景溪光深照席雲氣暗沈山好似西丘上扁舟幾日還口號四首為海樵公送別儀真舟中作道合形皆寓心親迹任踈偶然成解后握手勝交書矮篷仍漏雨盤屈不如蝸漢使天河上難追萬里槎功名隨分有聞道古難能收拾香山社霜顱及老僧蒲香仍五日不是獨醒時有酒從人醉長齋律自持絶句七言次韻馬虗中道士贈熊以善之金陵四首江湖隨處得相逢四壁襄衣客意同自是雲蹤無住著秋蓬何事解隨風師友平生孔文舉詞章今代沈銓期豈是雲林遺隱德未應才俊困明時朝望秦淮雲氣清夜聞鶴唳𭘧風聲參差天闕牛頭沒斷續鍾山馬首迎焚空聞招惠約上書誰復繼鐔津千巖萬壑不歸去落日長江思遠人次韻答石室元晦不審住來相熟未青衣迎棹慣看人糗餈分餉家家似薯蕷炊香頓頓新憐君身大不及膽想見道公應更癯實録自彰銘鼎義能來重掃石浮圖貝闕群仙羅玉質也知天上足金銀深慚造物相料理巖穴偏宜稿木身義公死葬廬山下也説曇華一度開猶喜老禪隨幻住昨朝天目寄書來杭標霅晝同房住况是苕華雪不如扁舟短棹不成去坐聽鐘沈月上初贈日者沈愛山君平天上知名久牛渚無人解泛槎獨抱囊衣江海去扁舟風雨度年華次韻答熊以善秀才升堂齊赴鼓隆隆獨著儒衣謁懶融也勝朝回隨雁起西風千騎過雲中風雨歸舟圖中流鼓枻欲何之乘興何如興盡時蛟鰐垂涎風作橫山長水遠暮歸遲古廟折碑圖古廟殘碑野水村行人回首暗消魂遙天何許孤雲沒不盡青山萬馬奔贈𮨇可和二首鏡容識我麒麟種茅氏憐吾丹鳳雛幸有小郎供膳美土酥如練玉芝江湖有術青烏子香火多靈白鶴仙乘興出遊歸亦好采芝種木赤城邊虞伯生學士以五詩贈一上人蒙見及一公將歸蜀謁趙魯公次韻醉罷蒲陶金叵羅散華方丈𭂁伽陀扁舟許我從公去浩蕩江漚萬里波潛宮樓殿五雲開雲外青山萬馬來黼黻天容歸化茟故應留待謫仙才我愛鍾山七佛居曇翁重掃劫灰餘先皇同受靈山記千古神龍護寶書魯國數年書斷每思高會聽雲和別時有約終相覓綿竹江頭雨一簑西蜀高僧讖馬馰十年江表飽蒿藜宗門喜見南回日千衆開堂借品題墨梅為馮仲實賦林華瘦影月微茫風袂參差玉佩璫更覺微酸生齒頰千林煙雨待青黃李息齋墨竹李公墨妙俱陳迹誰識湖州苦用心惆悵此君猶玉立空山風雨夜堂深雪窗蘭百畒無香失舊藂若為膏沐轉光風趙家三昧吳僧得未覺山人鶴帳空舟至通州夜雨大作明日京華拂面塵穹如雪馬如雲雨聲未忍孤篷別故遣蕭蕭枕上聞次韻送廖天與楚江送客暮帆開眼底何人識異材後夜月明潮又滿青山空繞雨華臺魚樂圖豫作菴東園將謀退休而未能入居之希古禪師寄魚樂圖索題感而為賦築室開池學放魚旋縈九嶋作江湖畫圖更覺煙波好野水寒塘雪葦枯畫馬華山歸牧空龍種傳得丹青十二間前歲上京聞扈蹕白雲如見六龍還湘水行春圖湘江何處問幽栖野服行春曉色微著我茅茨相伴好不堪𮕱疾未能歸淵明歸去圖橫亡海上只徒傷夷隘空聞餓首陽歸去柴桑吾故里高風猶是晉文章百鴈圖既集還飛水正深風驚葭葦亂拿音江湖尚爾防矰弋宜為傳書到上林孤嶼圖為雁山德長老題淡煙踈樹月朦朧路隔寒潮斷復通添箇茅菴分我住明年飛錫海門東梅雪齋為逯彥常賦梅雪相輝映遠空參橫猶愛月朣朧更期佳實充調鼎好青黃煙雨中李遵道墨竹曾共琅玗節上題淋漓不記醉時揮湘波舞風如佩猶待騎鯨碧海歸次韻答失蠻御史五首贈了空羽士劒光電繞蒼崖裂阿母金盤進紅雪携手一笑三千年更約乘鼇拾海月秋夜𪧐瓜洲江風山月亭波底織綃聞帛裂玻璃萬頃魚龍夜向來鼙鼓海門秋鴈驚不度穹廬月寄西山李處士每憶西山水竹居秋風林影夕陽踈江湖正自無知己底用嫌人索報書𪧐雪峯菴雪深麋鹿無行迹雲外樵歸何處笛老禪騎虎不驚人損拾荒苔挂高石遊仙乘雲直上黃金殿騎鶴歸來白玉京飲乾石髓開還合指點蓬來淺復清濟法師清鏡閣閣前湖水清如鏡好為行人照白頭寄我畫圖憐我老何年鏡裏認扁舟次韻馮東麓侍御留題鍾山八功德水天上群公玉笋森也隨陶謝入東林臨池最愛清如鏡不照𮕱容只照心東麓侍御赴燕南憲使留別次韻奉餞雄談咄咄氣隂森玄度三生得道林自喜神交忘物我誰知宇宙本同心竹石圖往年會盛克明於幹禮部舟中後蒙以便面相寄今見與喜近仁臺郎作竹石圖喜而為題我愛準南大小山座分江月弄潺湲竹君石丈能無恙偏稱臺郎玉𥬁班聯句秋夜同太原張翥仲舉水嘉李孝光季和龍翔寺聯句先皇曰潛邸梵宮冠東南金碧麗紺宇翥旌幢覆瓊櫩六龍駐神馭光百靈護鸞𩥵地蟠龍虎氣欣殿擁貂蟬簪文右露篆古翥化城天樂酣呇梁虹飲渚光壁甃蟾生潭復道星辰直欣觚稜煙霧含浮圖琅當語翥藻井函曾暉㩳鳳光清旭眩冰蠶望氣芒碭遠欣問道空同嵁御床塵翥仙仗華毿毿珠擩鎖玉柳光猊座涌寶龕遺弓泣父老欣執豆奔候男衣冠閟原廟翥矛戟圓精藍馮几𫾻末訓光銘鼎紀玄談聖祚萬世啓欣法筵諸佛參貝翻譯經六翥圖繪笑像三華衆唄作光象教一默諳猿鶴驚此客欣林澗洗餘慙齊厨飯香靄翥暝閣鐘聲韽錦篤渴獸抉光礎踞雕虎耽灑掃愧無補欣倡知匪堪燥吻茗屢沃翥苦心榮頻探焚膏續迅晷光捲簾納霏嵐氍毹月采淨欣鑿落雲液甘風籟摐古柏翥秋隂挾高楠戶牖蜂矗光丹青海波涵社中合陶謝欣方外師瞿聃息影了虛寂翥栖禪屏癡貪苾芻交折堲光伊蒲不盈甔心同略形迹欣纍遺忘憂惔錦雉絡扇羽翥赤螭銜釰鐔㕙豪走奰肩光麈尾揮鬖堅壘避屈賈欣陋邦敵吳郯韻劇魔膽落句雄神力擔擁鼻極營度翥刺手勞鉤撏撼筒遍銀鹿蠹剔白蟫幢鐙粟蠢蠢光鼎香穗馣馣山河入帝綱夫人繞優曇欣境勝情自曠理超思彌覃光雲臥委巾𭂁雨歸借箯籃翥報章愧木李留𭘖踰黃柑欣話言諒所慕沽醉詎可妉光捧廗白足惠翥觸屏蒼頭憨欣偏祖罽肩聳光鏤匡𨬀耳儋翥吾我涉誕謾欣爾汝忘話喃翥罅發粟穰厚色滃醪味醰光剪匪差可芼食魚更須泔翥青溪渙以劉蔣陵閜其欣茲事付千載相期𦀽廬庵翥蒲室集卷之七目録序道法師實録序天禧嵩講主刊施五十三佛名經序送瑞少曇歸江西序蘄州蘆山攝待菴序道場寺雲峰閣詩序悼中天竺布衲雍公偈序送方上人序楊雲巖居士作蔣山僧堂偈序王氏孝感瑞華圖詩序送張子安御史序王可毅尚書還朝序梅孝子序送臺醫馮善甫序

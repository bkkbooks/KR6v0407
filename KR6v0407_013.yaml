body:
  text: 豫章釋大欣笑隱說冲默字說古渝圓照師月公名其徒曰德照將俾嗣其明以不匱照克服訓鋒淬膏潤肆勤于業以渝處遐壤無以振厥美於是南游萬里永有當其志者胥會于錢唐請曰古以字稱敬其名也幸辱之字辭不獲因進之曰朏盛而魄生薪炎而燼棄懼其明之傷焉人有靈府物之綦明者也荒怠以蔽之私智以鑿之明於是乎替其有治之者不及焉則過焉闒茸者嫌於汙皎皎者害其察故君子學以繼其明明必守之晦而後照之義終焉字之冲默其可乎老氏曰知其白守其黑為天下式似之矣復祝之曰鑑兮匪形淵兮匪深無曰左右惟帝女臨子慎厥武孰圖其覆豫創于口遠莫豫復敬之敬之福履具宜曰有令德曰有威儀圓照之室施于瓜瓞尚昌于世以薦嘉字開通字說佛鑑居仰山以茶陵開禪者綱維其衆衆悅之相與字之通稱焉於其有請於豫乃進之曰若知夫通之說乎聖人之教人也因其明而牖之若四闢以逹于奧使學而至於通則善不可勝用矣其或有優於學而弱於實通諸古而繆於今猶迂轍以即途舟而求濟者不通於事也是以君子介而不隘和而不流默其智以容居易以俟命又必觀其時之通而後能大有為也故學不通不足以為善事不通不足以居衆時不通不足以傳道而學所以為己於用者為人乘時以有為者將以信於天下垂之後世也學也事也勉乎己者也人可能也時者天也人不可能也明夫二者其庶乎貽終矣通之義𬾨矣咨爾通式和且修不念佛鑑或貽之羞繼齊說大同張氏家百口不分兄弟相與謀曰古之受土賜姓何十百族今子孫或繼或絶不可考其可聞而知與吾高曾祖父同時為鄰里姻舊以貴顯富盛者求後某若某已無幾况其田廬器物者乎自吾有姓以來至吾高曾不知幾世由高曾至吾又幾季而先世遺業故無恙非吾宗碩德厚澤能若是耶自彼秦人家貧子賤出贅父子異處昆弟相訟相擠以禍幸其凍餒覆絶如路人不之顧者世相望也使吾不知戒而懼能保其後之必無是乎於是計其田若干推大宗之長主之籍其口衣食稟給喪祭婚娶各有差咸家之長幼適庶臧獲均有養焉歲閲其以𬾨不虞又慮其不知教或陷于辟則先志墮矣乃稡書數萬卷列群從子弟與鄉之俊造日講說其間作堂曰同善樂取於人也齊曰繼齊貴子孫世守之也而求諸能文辭者申其繼之之義焉夫堯舜禹湯以道繼者也文武周公繼志者也而孔子東西南北之人也孟子歷聘諸國俱不得位而道則繼堯舜禹湯文武周公者也由孔孟而下不得其繼焉宋有儒宗者能遠紹千載而學者廓然以得夫性命之正嗚呼世之欲學孔孟者則必若是繼之之為得也昔者公侯有國大夫有家民有恆産三代而降制不如古雖環琽之室士不必有惟道則修諸身職夫我者也君子其盡力於斯而已乎而張氏兄弟生太平盛時居有室食有土子孫繼業家益蕃大是天之因其材而䔍之又力學乎孔孟必有以繼其道者也然吾游方之外者而幼亦竊聞之故假其義以告張氏兄弟五人其季若思與豫交字子儼云靜隱字說御史楊公弘正世為西夏貴族年方壯又登顯宦才茂器宏翕然人以宰輔期之而常嗜欲泊然自號靜隱以寓其志或謂公耻與俗嬰思自拔埃塵之表有慕幽人逸士之翛然遐舉於世若不屑焉豫聞而疑之因孝古人命名立字或揭諸室而銘諸盤盂几杖雖其義無常然皆欲勗其德以求合於聖人之道也聖人之道必由定而靜以接於群動嚴乎顯微而後輝光著於事業是以靜隱之功致於學者也及其成德則雖窮困隱約寓諸耕釣版築未嘗一日忘天下豈若寒灰槁木漠然自棄於無用既而出為卿為公為帝者師則列土而封五鼎而食豈若泰然肆志甘蹈禍辟而不止者故君子間居則思致君澤民處榮觀則思靜退是又以靜隱之道砥礪志操而審乎進退之幾也夫靜也微也動也著也循夫內以應夫物而全吾心之德也出也隱也觀夫時以進退吾身也皆所以存吾道而求合於聖人之道也古有不得志於時則猶隱于吏隱于市非必逃山林若避地避世為哉况今朝廷清明俊乂在位公日嚮用若預戒貴盛無忘勇退以不改陋巷之樂如前所陳者云耳而彼乃方之以巢許沮溺不知公者也豫不得以無辨江山小隱說御史思齊公謂豫曰季第彥明年踰弱冠方勤于學而受命宰衢之開化以任百里之寄它日不患不登顯宦惟持盈守成以養其德善矣其友為扁所寓曰江山小隱取古之達人處功名貴盛時未嘗一日忘林壑不沈酣于利祿聲色若王逸少之蘭亭賀季真之鑑湖是已豫謂知幾審時擇於進退則庶乎而日樂乎外以忘乎內志其小而遺其大未𥁞美也孰若返觀吾之巋然獨存汪然常盈運今古而不息育萬物而不有者以進夫可久可大之業雖有力挈泰智測溟渤而不能窺吾高深之倣佛江山云乎哉小隱云乎哉思齊命書其說以授之題跋恭題文宗皇帝御畫萬歲山畫今上居金陵潛邸時嘗命臣房大季畫京都萬歲山千屏大季辭以未嘗至其地上索紙為運筆布畫位置令按槀圖上大季得槀敬藏之意匠經營格法道整雖積學專土所莫能及而天縱之才豈以是為夸美哉聖意若曰世祖由南征平天下定邦畿作宮闕以開萬世之基是不可一日忘也身為適曾孫而自任以世祖之重使登其山居其宮母以逸豫為期而思四海之廣必人物咸若登春臺躋壽域而後可同樂也猗與盛哉自是而入繼大統膏澤屢敷于九有疇克以是圖再進聖覽必感昔之作圖以寄其思而今則居之推廣當時之意其祖宗生靈之念又將油然動千宸哀而重增眷眷也臣大欣比以方外蒙召獲睹皇居之壯辭闕踰年因閲是圖無任感戀謹伏書其下云題左德明刊施金剛經後盱江左德明舟往儀真至荻港中夜風大作鄰舟飄失亡慮十百獨左舟若有神持之者舟人異而問之曰我嘗卯金剛經千卷施人豈以是而報我耶又見大舟覆浪中左曰是必有人未溺死急出錢與善游者棹它小舟趣救之且令持斧破舟鑒竅以呼果得十五人以出道由金陵為豫言之將再施經以答神貺復欲求名公三十二人各書經一分集成而鋟梓焉因告之曰經之教人以明夫性也而金剛者取其不變不壞如云一切佛法皆從此經出豈不以此經即吾之自性而不可一豪加損其中雖三十二相六波羅蜜尚不可得豈况執六塵四相而欲聞此經乎使能識此經以擴夫自性之妙則藏一微塵而非隘包太虛而非廣在眴息而非速亘萬古而非久大浸不溺大火不熱者蓋理之常非假它術也又何特驚濤之恐因此經而致神護較小施報於禍福哉左聞而喜請書以為經序記風之夕維至順辛未十月十九日顯曾大父北澗禪師方中字說後古人所謂方於中者為正直為剛果為不詭隨圜於外者為智謀為權為變應於無窮而行於無事也其有以愎執為方以諂以柔為圜者無取柳子厚說車固善而陷伾文之黨於圜之義得無少辨乎吾曾大父䪥室翁字圜上人以方中而使其求柳之說以自懲勸蓋吾道與世教有同而異異而同惟隨事酌義若圖澄之於石勒羅付之於姚秦閔生靈之塗炭而善導其昏主所謂圜而方者也大覺之焚龍鉢楷公之拒紫衣戒吾徒以奔濫而卻君之賜所謂方而圜者皆有垂法後世番陽趣上人得翁遺墨請伸其義而書其後云題曇西竺母李氏基銘後番易桑門紹曇之母李氏卒將葬曇走金陵以告其友大欣曰吾族世為儒曇以父母命幼使學佛其始旬日一歸省曰汝無不堪苦𡧯耶既而數月一歸復曰吾非以汝兄弟多而遣汝聞佛之言性有謂一念萬年者吾深慕之欲汝得其道以告我不猶愈於堇直滫瀡之奉乎於是即日別去求楚吳甌越之名師往學之餘二十季懼無以歸白母令母不待而卒欲庶幾古人織屨為養不可得已雖歸又何以藉口見鄉黨且吾諸兄乞銘於鄉先生果存已悉其家世行實與卒若葬之日月而不及吾母以命我之志請復得豫之言附之碑隂以益吾痛而悼吾母之冥冥也言訖又泣豫聞之矍然曰而母其知道乎形生者一世而𥁞而性者窮天地振萬世而不壞者也佛之言性必見之明守之固而後為聖為賢若或明或昧或操或含與所修之異而為天為人為鬼神為異類𪷤乎可畏故學者絁情去纍一志于道以有盡之形求不壞之性欲一世而成功萬世也以是報親不既重乎曾子謂先意承志諭父母於道孝之大者矧佛之制其徒猶䔍孝養若曇以志事親是誠乎孝而知所本矣又嘗從佛鑑禪師于徑山掌其記端慤有文克荷吾宗故不辭而書以歸之題朱俊卿為父母修冥福後亘萬世窮天地不磨者惟靈明之性不以生而存不以死而亡不以聖而增不以凡而減雖人人均有之而隨物奔逐頃刻萬變飄忽千里如野馬陽念念不停至奄然而逝則貴者不能有其位富者不能恃其財而親者不能留其愛也有足悲夫故吾徒以死生為大懼必明夫自性而求所謂亘萬世窮天地不磨者也又吾佛言人之死而生生而死死有所往生有所來有三世有四聖有六道由人之所修而異入焉聞者凜然知所懲勸而自格非遷善徵諸古驗於今為不誣矣儒以治世設教修人事而厚民生若死與鬼事寡言之至曾子之唘手足易簀不亂而訓亦嚴矣錢唐朱俊卿儒者也居母喪致孝以其父母嘗學佛故邀釋老之師說法以資冥福將使明夫不生不死之性而進于道也亦其父母之志也曾子曰孝者先意承志諭父母於道俊卿以之題高氏守拙詩後孔子之門子貢最為辨博猶曰賜也何敢望回回也聞一以知十則顏氏之才敏世宜無與伍者矣而孔子稱其庶乎屢空又曰黜聰明隳肢體由是論之道有體用學有本未聞一知十待用於外者也黜聰隳體致力於內者也三代而降大道不行民俗偷僞聖賢者將使遡流而得原斂華而歸實以求復其太檏於千載之上也真定高至元間由司憲出牧大郡為政以能稱而自稱曰守拙其有取於顏氏之黜聰也耶夫物欲之熾不翅火之燎原非達識則不能黜其聰其意匠之斧斤且且而伐之非大智則不能守其拙而或者謂之守拙蓋嫉夫世之以察為明以刻為能以詐為忠以矯為廉而資之以釣大名躐厚祿自以為巧為得志而人亦歆豔之故耻而甘於退拙而因以自命也曰是亦窺其外耳而不為是也豫生晚與侯未之識而獲交其子若壻聞之談笑娓娓危坐而化是足以徵其平生且沒三十年子孫益蕃衍其積德之效又不可誣也它日季淵以所藏守拙詩纍軸示豫曰先君之手澤未嘗一日去目也豫受而書以歸之以識其孝思使而有知亦必以豫為知言題東坡與程正輔手蕳蘇公以剛正為小人譛凡所交游亦為羅織其時有得其文字者不敢以示人甚者取所書于梁壁亦削而漫之而後世祕惜之過若父祖手澤當時小人猶切齒憤恨如己寇仇然由是觀之大抵人之心術不可不正又何忍而不為君子耶此帖在惠州時與程正輔者二月而云天氣斗熱其炎瘴可知而它書又云譬如惠州秀才纍舉不第有何不可其胸次洞達不為憂患所移可想見其人矣觀此益增感歎題癡絶禪師書山谷煎茶賦後魯直謫居瀘戎雖瀕九死而怡然自得效蜀人法事茗飲愛其風致作賦紀之後百餘年當宋季淳祐間蜀阻兵𮧓癡絶禪師蜀人也思歸其鄉而不得讀魯直賦悲之書以寄所感焉由享祐距今皇元天曆改元之秋又八十六年矣而蜀再罹兵亂比喜眼順然不無傷殘也豫雖非蜀人觀癡絶所書能無感慨佛言世界衆生悉由𪧐業流轉惟有道者持以定慧之力能安行而順適彼外之貧富夷險無一毫加於我也魯直知道故謫居異土如享廊廟鐘鼎之樂癡絶悲蜀禍之慘知𪧐業之不可逃惟修定惠足以勝之然則作賦與所書為後世貴重者以其道也金華樞要堂䔍志於道得而甚祕惜之或者玩其辭之超勝而議其書之工拙者無取題東坡手帖蘇子瞻嘗有詩云周公與管蔡恨不茅三間推原棠棣之義以仁人之於兄弟也無賢不肖一以親愛待之周公身任天下之重處嫌疑而以大義滅親豈其心哉豫瞻以直言立朝流謫萬里思其弟而不見故追記其詩而書之愛友之情可勵風教况其詞翰俱妙乎題松雪翁所書千文松雪翁為豫書字凡數百幅悉散於人無一存者豫素不習書其真二拙皆莫能辨然如天機相馬正不求於驪黃牝牡也有以翁所書千文求題故云題殷濟川畫吾友遜敏中得殷濟川畫達摩寶公而下禪宗散聖者凡草八人併取其平日機用模𭂁之然南泉斬猫雪峯輥毬蓋其一時示人如石火電光不可湊泊心思路絶語默俱喪况可以筆墨形容哉畫者正如郢人誤書舉燭而燕相尚明國雖治而非書意也敏中博識謂濟川名畫脫去畦畛常牧溪嘗從其學又癡絶虛谷諸老題後稍珍惜之然豫不可以無辨也題思聰遺墨後歐陽公慕韓子作文因欲攘佛而喜與僧交蓋當時僧有以取重之者聞訥公之辨博而見明教之上書固已氣沮心服其下若惠勤思聰又因其所好以相入蘇子瞻謂聰九歲善彈琴十二舍琴而學書十五舍書而學詩又曰惠能生定以至于道則書與詩當益奇觀此可見其人品矣天台聰聞復名若字與思聰同所業亦相類士大夫多樂與之游惜時好趨尚各異未有如歐蘇者以振發之因其以所藏思聰遺墨寄題豫既喜其所同感其所異并識其未云蒲室集卷之十四目録題跋題宋高宗書東方朔答客難題三教圖題陳世榮血書金剛經後書金陵十詩後題安國寺記後書瞻雲亭詩後書商學士畫山水圖詩後題凝翠樓詩卷後題山谷詩後題米元章書後題斗極杓公遺詩後題王荊公尋僧書卯土寺記後題東林寺重題放魚記後題趙間間書心經後頌大龍翔集慶寺素覺皇像頌有序針約之針有序明善針為陳氏作元履針為臺郎高君作有序𮚌妙法蓮華經𮚌有序摩騰𮚌有序妙有堂𮚌有序玄卿𮚌有序堯卿御史豸冠像𮚌王道人𮚌趙宗吉御史豸冠像𮚌

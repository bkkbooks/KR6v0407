body:
  text: 豫章釋大欣笑隱序奉勑重修百丈山大智覺照弘宗妙行禪師禪林清規九章序祝聖章人之所貴在明道故自古聖君崇吾西方之教不以世禮待吾徒尊其道也欽惟國朝優遇尤至特蠲賦役使安厥居而期以悉力于道聖恩廣博天地莫窮必也悟明佛性以歸乎至善發揮妙用以超乎至神道民於無為之化躋世於仁壽之域以是報君斯吾徒所當盡心也其見諸日用則朝夕必祝一飯不忘而存夫軌度焉報本章性者人之大本也振天地而莫知其始窮萬世而莫知其終佛與衆生均有是性悟之而登妙覺迷之而流浪生死從劫至劫六道異趣業報展轉無有窮已所賴聖訓洋洋堪作依怙吾徒沗形服與法系遵其行之為律宣其言之為教傳其心之為禪而循吾所謂大本者以同夫佛之全體妙用始可稱佛子而續惠命也其於諱日追悼豈世禮哉報國恩章國有禘祫四時之祭所以昭功德隆本始重繼嗣也而聖朝崇佛世祖而下咸各建寺謂由佛應身以御天下化儀既終復歸佛位於是設聖容具佛壇場月以五祭龍翔為文帝潛邸奉旨春秋二忌各藏經七日畢臺臣設奠展禮如生而致夫羹𡒅之思焉然吾徒之朝夕于斯者母以華居佚食為安惟勵夫道而思所報效以期于心法俱泯施受兩亡則不徒食而徒居也勉之勉之如世祖列聖忌諸官至期詣各寺行香謹識時日子左方尊祖章人各祀其祖重其形生之始也形生始於愛然形有時而化愛有時而盡惟性之靈然不昧者不恃生而存不偕亡而亡故佛教人必明性而後之學者復膠於文言不得其指歸猶醫之善方書而廢藥石何益哉及吾祖達摩至示以直指之道而人始廓然見夫自性之妙不求文字不資語嚜而得於罄咳聲色之外則吾徒之傳祖道嗣祖位者如火之薪水之器無古今之間豪髮之異不猶重於形生之始乎後百丈海禪師又作清規以居吾徒而禪林於是乎始白雲端公謂宜祀達摩於中百丈陪于右而各寺之開山祖配焉見於祖堂綱紀序住持章佛教入中國四百年而達摩至又八傳而至百丈海公唯以道相授受或巖居穴處或寄律寺不聞有住持之名百丈以禪宗浸盛上而君相王公下而儒老百氏皆卿風問道有徒實蕃非崇其位則師法不嚴始奉其師為住持而尊之曰長老如天竺之稱須菩提以齒德俱尊也作廣堂以居其衆設兩序以分其職而制度粲然矣至作務猶與衆均其勞曰一日不作一日不食烏有𢈔稟之富輿㒒之安哉故始由衆所推既而命之官而辭聘不赴者多矣後則貴鬻豪奪視若奇貨然苟非其人一寺廢蕩又遺黨於後至數十年蔓不可圖而往往傳其冥報之慘有不忍聞者可不戒且懼乎兩序章兩序之設為衆辨事而因以提綱唱道黼黻宗猷至若司帑庾歷庶務世出世法無不間習然後據位稱師臨衆馭物則全體𬾨用所謂成已而成人者也古猶東西易位而交職之不以班資崇庳為嫌今岐而二之非也甚而黨鬪強弱異勢至不相容者有矣惟主者申祖訓以戒之欲其無爭必慎擇所任使各當其職人無間言可也大衆章歸虛之水鄧林之木以聚者衆也今夫大方居衆千百倒稟而炊赭山而爨亦其所聚也而四方之來如歸若己所固有者果何為哉蓋佛以人之流轉三界出沒生死惟明道悟性以超于妙覺則群生異類咸資其善而訓其徒以肖己為然故人人之待其徒猶待其師雖摩肩攝踵而至惟恐奉之不及不以其衆而少怠也不然則有以尺地斗粟而相訟者多矣豈其獨愚甘委其資以廣吾居輟其飱以食吾徒吾徒之食于斯居于斯果何為哉果何為哉節臘章僧不序齒而序臘以別俗也西域三時以一時為安居出入有禁止凡禪誦行坐依受戒先後為次而制以九旬䇿勳于道以三旬營資身之具使內外均養身心俱安也尅期進修不舍寸隂護惜生命行兼慈忍旨哉聖訓萬世永遵而五竺地廣暑寒淋潦氣候之弗齊故結制有以四月五月十二月然皆始以十六日所謂雨安居者因地隨時惟適之安或曰坐夏或曰坐臘戒臘之義始此如言驗蠟人冰以坐臘之人驗其行猶冰潔或謂埋蠟人於地以驗所修之成虧者類淫巫俚語庸非相傳之訛耶且吾所修證聖不能窺豈外物可測其進退哉今禪林結制以四月望解以七月望者若先一日講行禮儀而期內得專志於道故略其繁文亦隨方毗𡰱或儀不如法而不知其得法外意也中土以冬為一陽之始歲為四時之專物時維新人情胥慶禮貴同俗化在隨宜故以結解冬年為四大節周旋規矩聳觀龍象之筵主賔倡酬兼聞師子之吼禮文秩秩猗與盛哉法器章上古之世有化而無教化不足而禮樂作焉擊壤之歌不如九成之奏窪尊之飲不若五齊之醇然文生於質貴乎本也吾天竺聖人最初示化謂人人妙覺本無聖凡物物全真寧有淨穢無假修證不涉功用而昧者茫然自失若聾瞽焉於是隨機設教擊犍稚以集衆演之為三藏修之為禪定迄于四十九年而化儀終矣梵語犍稚凡瓦木銅鐵之有聲者若鐘罄鐃槌板螺唄藂林至今效其制而用之于以警昏怠肅教令導幽滯而和神人也若夫大定常應大用常寂聞非有聞覺亦非覺以考以擊玄風載揚無思無為化曰自永雍雍乎仁壽之域清泰之都矣曹文貞公續集序嘗讀唐房社王魏傳咸稱其善屬文而文逸不傳特著其相業與善諫諍之尤焯然者至今人人稱誦而以不得全集觀之為恨然聖人之教人本以尊德性道問學士行之美全德為上德𭀚於中文著於外其為政設施則必俟夫時與命而君子不可必焉故觀人之道稱其政未若論其材誦其言未若薰其德往年吳興趙公子即巴西鄧公善之與豫為方外交抵掌論人物亟稱漢泉曹公士開寸德之美豫故以心識之至治間公以侍御史來為浙西憲使省百司氣𢝌股栗善政著聞天曆初文皇尊用儒臣特授公西臺中丞尋以老告薨于家諡文貞公至正四年御史臺文下刻公詩集于諸路府學示所以褒崇元老勸勵來者而使有矝式焉惟古國史采詩以觀民風漢魏晉唐而下詩益盛猶必擇夫名家之傳世者然後入誦而家藏之若公之作固可名家傳世也公之季南臺管勾君又得於公之賔從僚佐門生故吏之所稱道傳𭂁凡詩與文若干編彚為續集若干卷增刻之可謂善繼述者矣若公𫾻歷臺省建言論事雜著書蕳不止此藏於碭山家孰君以職所繫未暇歸而掇拾編録尚期它日以成其志噫視房杜王魏之逸遺人猶惜之而公之寸德既施於有政復有文以傳後於是人又喜公之有子而占慶澤之流於無窮也豫嘗承公有一日之雅竊敘其末而附于韓之大顛歐陽於居訥之義或無嫌焉送常道夫遊武夷詩序士貴明道而不知道之所以明其有得於師友講論之緒餘則資以潤色文辭發明著述自足名世傳後孰有泯見聞絶思慮超然獨得於筆授口受之外以振天地窮萬世而獨存者乎吾遊方外辱交名公士夫慕其雄文碩望者固多矣而以道相求心無間然獨得常公道夫公天曆間辭西臺照磨遍遊名山東探禹穴以極于海西踰岷峨南渡滇池北入窮髮意所欲必至萬里跬𡵯也凡魁儒隱士禪宗仙老必卑己咨詢及言忘神會脫然有得於語默耳自之所不及而親造之妙則又若身至目睹之不可誣也自是而麾斥八極磅礴萬物以與天遊矣後至元中連為三臺御史犯顏極諫鉏擊姦邪有古亮直之風升雲南憲副行省百司敬之猶神明士民愛之如親及公辭歸省憲交訟人益以重公公家關右少仕江南中年歸葺廬墓教二子皆為名儒使奉祭祀於是放情山澤時從一僮或單己獨往日百里如飛與野老豎牧雜處忘歸冬夏一裘葛泊如也及臨政言事雖斧質在前不為少沮蓋能一死生齊禍福而威武可屈乎視身世物我如邂逅而貴富賤貧能易其慮乎吾嘗愛宋楊次公之為人而公則庶幾之至正三年宣政院奏公斷事官未幾移疾來金陵留旬月又將有武夷遊吾羈官寺而不能去乃書所愧以與之別送周君崇判官序國朝建行臺于金陵以𮈒制南紀故金陵雖大郡朝夕奉約束惟謹郡守佐往往避煩不樂就就或託故去否則盡剗鋩鍔務善圓以趨合而猶或不免焉至元六年冬廬陵周公君崇來佐郡奉上以誠持己以廉介不激不隨不為表襮惟章明法律示吏民以信先數年江西湖廣輸粟郡倉轉輸海運達于亰郡縱吏裕取而約與致鬪死殺傷亡算公至董之下令條析一示之平至今遵以為式更作臺治察院與曹南王卞將軍祠委公督其役工具落成而民若不知三年郡安其政公雅恬退不求薦楊而與人誦之謂古之仕者得任專行志故施惠於民也易今則牽制上下而金陵為尤難况一倅能設施如是乎由是專一府帥一閫視古良牧豈多讓公曾大父宋季嘗參金陵帥幕大父守廬陵公以蔭三為邑宰皆著善績及是纍官五品而升秩未涯也夫棧道九折而車行無休呂梁千仞而舟銜尾以濟惟慎之而已况公以家世之舊安行乎仁義而輔之以寸智何適而不可公行矣當大展其用以副輿人之祝豫忝同里又辱知竊喜而書之且率吾徒賦詩追而與之別送高德潤歸義興序豫居杭鳳山時有別墅陽羡嵗一至焉愛其長林豐谷平園大溪之勝又多故家文儒可與遊從始欲終居之特懼其賦役煩重兼細民頑獷好鬪甚至其父母妻子有病痬死喪祕匿不發鈎人唇吻佯相歐擊密以死病者推墮舁致乘之以掠人廬室器物小則責賂及負若租貸甚則誣之官撿覆逮繫至纍嵗不能自直者往往而然故家巨室不幸遇之立可破産其有幸能樹立則必結官府交貴遊援聲勢以自張否則使子若弟業吏不顧汙其身覬以保其家舍是則雖有良田沃壤不能一日而守之也豫去杭來金陵而不至陽羡者十八年矣今年春高君德潤來自陽羡訪其故家遺老則淪喪無幾而重吾所感如是焉德潤年壯寸茂大府將試補吏不樂也上書御史府御史器之舉充校官捧而歸以尉其親方大肆于學以應明詔以取科第仕進若拾級爾豫故書所感以贈其行使其里之人視之庶有以變其俗且期德潤他日試用為長民於四方必能敦美風化致時治乎則吾可隨地卜築終吾之老于以締方外之好焉送姪陳九萬道士序吾族由九江徒南昌世為士人自吾從祖父伯父與吾始學佛而吾弟與姪又有為老氏學者吾鄉之人以是占吾族之隆替而不能不有感於時代人物之異或者又曰自戰國秦漢以來王道不行大夫士無世守之業故豪傑之士往往寄迹于浮圖老子中而世道系之矣噫為是説者指其迹則似之泝其世推其事則有足悲也而不察夫道有常有變有異而同同而異而終合於大同也人之貴在明性而孔子牢言之至於定書其三墳大道又闕而不傳豈以生亂時惟因事制弊急以綱常之教維持之故於若性若命若死生鬼神有不暇論且不欲以廣大無徵之語以疑其俗然猶時發其祕惜無上智之資能自求而獨得於言外也及佛入中國而言性也詳以盡濟物也漙而博而大道益明於孝氏之道德使人泝流窮源復于大檏以即乎性命之正者雖翕張不倫而同所以輔世也如曰易有太極是生兩儀曰有物混成先天地生與吾所謂三界唯心萬法唯識者不同乎曰精氣為物遊魂為變萬物出於機入於機與吾所謂三世果因善惡影響者不同乎而後之不能本其道之同而斥以兩岐之異不惟其教之善而訾以未流之弊者非通論也又安得通人而與之論哉適吾姪九萬來省豫問鄉曲話故舊而及或者之言吾不得不復其説且喜九萬雖黃冠而不廢儒業又將從吾遊以究吾所學而吾以潛邸新寺方事營繕而未能也故九萬暫別歸洪他日寺成乞退居巖穴當招九萬同往因書所論為約而訂以爽云楊氏鏡中序嘉禾楊公顯官四十年有異政猶若不然常曰人之貴在明性而已聲利非吾志也而佛之言性大備於是交於佛氏之賢者而求其説焉其家人子弟率通佛理有女名端惠聰敏絶人適姑蘇陸承孫以二族之大施德姻黨而樂習禪定凝坐終日自號鏡中取於應物無迹之義夫範金為器者各職其用用之勞則弊惟鏡之為質也靜而其用不煩明足以鑑量足以容其來不迎其去不將其在人則靈府也人不自見其形俾自視莫見也必得鏡而後見之夫鏡外物也形吾形也非鏡吾無以見形非見形吾無以見鏡之明故且且視之猶懼夫鏡之昏焉吾貌之少而壯壯而老日遷月化倐忽變而形不能久也而吾之所以靈於物而亘天地不磨者反棄之不顧其輕重取舍顛倒若是有足悲夫月上人周易解序吾族世業儒而吾幼學佛於儒之事不通臨川危太檏以其從父有為釋氏曰月公者所注周易徵序於豫豫謂儒先於易論之詳矣庸置吾喙於其間哉吾與月佛之徒也不若以佛之意求之佛言性之初虗而明虗明而風金火水相蕩相摩而天地人物形焉與易有太極而生兩儀四象八卦其旨相合而老子曰道楊雄曰玄是已或謂人稟二氣五行以生而曰性出天地何哉夫性之體其大無外其始無初其存無終不可得而名狀也古之至人以其高而明者象乎天博而厚者形乎地文於其中靈然不昧假夫形氣以生者為人與天地而三之天地變化而有雷風水火山澤重之以六十四卦衍之以三百八十四爻而剛柔卑尊之位列焉猶人之貌言視聽思其有聖愚之相遠其事有吉凶悔吝之倚伏雖萬不同未有不循夫性而出者也而世之以氣以習論性而自狹自私以自戾夫先聖之言吾無取焉唯邸子謂心在天地先而天地自我出者得之譬之水出於崑崙其始濫觴流而為江為河為海匯而為沼泓而為泉鑿而為井鼓而為潮汐激而為濤波漂而為沫為漚為泡汩而為泥為濁為穢泥而為冰融而為液其實皆水也如以一漚之小而責其水之不大不知水之全者也人之局於形氣之微而自昧其性之廣不識夫性之全者也能識夫性則可與言全易矣故先賢曰心易曰已易者有得於佛之説人人廓然以見夫自性之妙不儒釋而異也則月之注吾之序孰曰不然吾又聞先師言咸淳間三衢耆𪧐簡竹屋由餘于過臨川夜與月公論易達且而別簡恨迫於官事不克以禪門綱要相與激楊蓋月未嘗出遊終日兀坐觀河圖有警悟非由師授而能也受業雙林寺自號雙溪云蒲室集卷之九目録記開府儀同三司榮祿大夫平章政事集賢院使領會同館事吳國公杭州路淨慈寺歲閲藏經記開府儀同三司榮祿大夫平章政事集賢院使領會同館事吳國公杭州路高麗惠因寺歲藏經記吳興封山資敬寺記代佛智師作杭州路金剛顯教院記代趙魏公作松江府龍門寺記龍興路靖安縣毗盧院記龍興路奉新縣寶雲寺記吳江州水月院記龍興路南昌縣印土寺記寧國路宣城縣珩琅山法雲禪寺記

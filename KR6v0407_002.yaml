body:
  text: 豫章釋大欣笑隱古詩七言月支王頭飲器歌呼韓欵塞稱藩臣已知絶漠無王庭馳突猶𡘆漢使者縱馬夜出居延城我有飲器非飲酒開函視之萬鬼走世世無忘頓功月支強王頭在手悵下朔風吹酒寒凝酥點雪紅斕班想見長纓繫馬上髑髏濺血如奔湍手麾欲回斗杓轉河決崑崙注尊滿酒酣劒吼浮雲悲使者辭歡㱕就館古稱尊𬾨獻孰知盟誓生戈矛斬取樓蘭縣漢功臣猶數義陽𬾃曹娥江讀碑圖海門五月潮如山龍伯奰𭕘蒼蛟頑越俗輕生好巫鬼婆娑踏舞洪濤間群巫姣服盱獨好歌聲忽絶紅旗倒孝娥死𢬘父尸出天地無情日杲杲雄詞不愧邯鄲兒萬金莫購中郎題碑隂八字非隱語德祖有智如滑稽豈是阿瞞不解此感愧上馬㱕路迷女德猶能奮其節壯夫氣吐萬丈霓奸雄復欲欺後世白頭猶愛漢征西丹青似是董狐筆千年要與竹帛齊娥江新廟照江水可憐銅爵草萋萋太白觀瀑布圖我本白雲人見山每回首披圖得松泉感我塵埃久我家只在九江口從此扁舟到牛斗翻愁天上銀濤堆石轉雲崩萬雷吼水行地底不上天龍泓豈與滄溟連風葉無聲飛鳥絶月光雲影天茫然丈人何來自空谷謫仙招隱當不辱林稍噴雪舞飛華尚想隨風唾珠玉馬首青山如喚人㱕來好及松華春泉香入新釀解公頭上巾今者孰不樂荒隤委荊遂令畫師意萬古留酸辛酸辛復何益東海飛紅塵駿馬圖世無伯樂亦久矣駿馬何由千里至披圖猶似得權奇豈伊畫師知馬意何人致此鐵色驪毛繞腹新𮢶蹄帝間遠謫天駟下馳來月窟浮雲低古王有土數千里八極周游寧用爾方今萬國效奔命合遣龍媒獻天子飈馳電沒爭辟易萬里所向無前敵男兒馬上定乾坤腐儒詩書果何益幾愁骨折青海烟黃沙野雪穹廬前幸逢好事𭂁真傳似向長鳴誰與憐嗟我身如倦飛鳥十年繭足愁山川安得千金購神駿攬轡欲盡東南天𪧐牛頭菴有序延祐甲寅十二月登牛頭山雪後見草菴如有淵道人居之從一竇俯入中可丈五設一柴牀無它長物客至則立語謝客客故去淵以半坐分我且言始至從撨者丐畚茅席地為座雨沮洳翹立終日居人始憐我有周文卿為搆瓦屋三間而子適至豈有所待耶敢以菴纍子一日會周相歡如平生翌日作詩相留豫既慕融公高風欲憩止焉而志不果作短歌謝周憶昔壯年游東溟大船椎鼓江上行天女吹華龍象舞風水夜作蛟鮀驚浩歌聲戞牛斗上百年有志非功名箋經肯讓甘露上書獨許嵩仲靈青春悠悠去不返萬里孤蓬尚漂轉可憐歲晚長于城冰雪連天江漢遠紫雲如蓋青石寒必逢勝處一解顏平生始識周處士臨岐握手俱忘還老子胸中飽丘壑道人眼底無江山十日茅茨臥風雨便擬挂錫烟蘿間師年八十不可待又欲為母營朝餐况聞大法可痛哭我心安得如石頑初發金陵夜泊龍灣寄茅山道士李方外人生不必行萬里亦不願讀萬卷書願為茅山十日客山僧座列群仙圖大峯揚旗出天闕小峯萬馬爭奔趨俄頃波濤忽破碎木未飛上金畢逋青書晝馳壇室靜王鞭夜擊聞傳呼去年獨𪧐井下天風拂地迎麻姑今年許入玉柱洞誰遣旅食隨檣鳥懷人吊古夜寂莫寒江落月號猩鼯祖龍埋金王氣歇梁宮晉沈烟蕪想見雲龍映朔日山中宰相良非迂趙魏公松石梵僧圖趙公說法如淨名自言前身元是僧惟師粲可樂禪寂譯經不讓什與澄如幻三昧驚幻目遊戲三生餘習熟天子置之白玉堂富貴苦人如桎梏不受一塵虗自照萬物藝藝觀衆妙揮毫不假意經營我知顏陸非同調當時西域多龍象獨畫深禪了真妄巖石寧須著幻輿淩烟不必求諸將誰呼胡僧從定起向人不語唯彈指顴頰深眸貫雙耳㱕渡流沙三萬里我獨何人甘陸沈著腳紅塵十丈深長松有約從公去南嶽天台無處尋嶽柱留守捕蝗詩有序丘柱留守嘗監懷慶路穀將登而蝗至禱之唐太宗廟一夕大雨蝗盡死歲以大穰都人士作詩美之豫亦追賦一首蛇可捕子虎可搏古者尚譏官政虐彼蝗為灾不可禦忍使吾民委溝壑我作郡民父母救灾弭患必師古貞觀天子天可汗仰天吞蝗天悔怒新廟奕奕神所持牲肥酒𮌈拜且祈我苗芃芃黍離離嗟我婦子同耘耔生而孔艱復殘之曷若勿生勞我為雲車風馬來委蛇凍雨前導風凄其盡殄孽類無留遺僵若蟬糊枯枝民頌德曰辭㱕功於神民不疑嗟哉彼蝗人共知彼人而蝗胡可欺膾人之肉啖以肥維跖暨粲盜所資亦有讒舌如銛錐笑談只尺生危機古來覆國七廟隳四海流血民瘡痍神不殛之神所疵惡稔而斃往莫追天人好惡常背馳不生鸞鳳生梟鴟茫茫太化不可推為惡可肆為善危文皇至今天日姿宜錫我福如茨如房如杜登天𭏊去惡如草務芟夷如殲厥蝗不復滋吾民重覩貞觀時作歌長尉吾民思商德苻畫為雲門若季蘅題左山文采妙一世季子德苻以畫傳家世風流寧復爾粉繪零落隨朝烟德苻一飲一石酒山中作客無旬久携我一匹東㱕畫成許寄墮鳥有溪翁何幸得片幅著我風瓢寄枯木萬壑驚濤聲撼屋隂崖六月寒生粟我倦將迎奔驥渴有懷浩蕩春江闊惠遠何曾過虎溪猶聞大覺𡘽龍鉢豈無荷屋薜蘿衣豆苗如玉山雨肥十年已負長松期扁舟好逐畫圖歸會曹伯圭故人乍見如生面良久熟視仍驚呼六年怪我憂患餘不應豐美如瓠暖湯濯足敷座坐呼童爨玉美土酥携過雙林謁大士天華吹墮紅氍毹斷穗清霜農圃淨寒鴉落木漁村孤從游復恨冬日短張鐙待月松堂虛淵明不入惠遠社杜子頗是𮚏公徒彼皆艱難困生理好事豈有此樂且曹君曹君慎勿踈他年念我專壑居夜來奇夢果有徵乘風萬里雲龍趨送張清夫清夫吳江人為其友袁通甫收遺文來錢唐作歌送別子平生妙斫輪未必俱化隨埃塵十年讀詩不相識斯文義與骨肉親遍搜遺槀走江城吳人往往未知名錢唐晚值張公子為我開篋金石鳴昌歜尚須論所好惜哉已往空戀况有張公德業崇欣也敢不攄懷抱去年湖隂三日雨飢吟待且聽五鼓風水愁催晝鷁飛松杉喜作龍虬舞別後寄書能幾回搴裳有約今雨來高歌擊節孰不樂空山井塌生秋苔王門曳裾三十載只今鬢影霜𤾢𤾢風流何止一丘壑置之燁燁黃金臺顏暉耕牧漁撨圖南陽草廬人已非短衣飯牛歌獨悲渭濵之叟非熊羆買臣五十即纍纍江湖與子終忘㱕北風吹面鬢如絲次張夢臣侍御游鍾山五十韻驪駒在路客在門送客張燕當平原鍾山𤠔鶴有舊約石磴百折不憚煩振衣西揖洪崖月持竽東拂扶桑𣊟天風高寒鳥不度隂崖六月挾纊溫張公身到牛斗上㱕路雲中哦七言老韓角勝光萬丈山火爛爛照陸渾玄冥却走海若避大旗偃道車橫撴仙騎氣御八極乘月夜過羅浮村神交千載若有待天𢌿王室為屏藩平生知名今識面精爽飛動風中幡繡衣東來肅南紀玉質照映沙塵昏相依願為繞樹鵲擇木不愧投林𤠔揮豪千章水東注雅思萬古雲孤騫前席趣㱕宣室殿瞻星夜近太微垣林下從游恐相負小山藂桂何滋蕃新詩題遍霜筠節雄文鐫入蒼崖根上方樓觀霄漢御榻當年朝至尊瀛海三山扶納陛雲烟千尺上鉤援嶽瀆奔驅百靈集蛟龍上天九河翻芒碭雲氣不復見鼎湖弓劒今猶存松檜𣯶𣯶葆羽合重岡肅肅萬馬屯中丞元勛王相種天庭簉羽𫅦鸞鵷六時長齊供梵唄終歲不聞絲竹喧每對羹墻增感慨從狩鈞天勞夢魂洞庭日下蒼梧野落木西風揮淚痕居憂起復重嗚咽百年忠孝情彌敦幕中從事盡金玉雅頌更奏伯氏塤山人枯槁甘自棄幸一染指如解黿豸冠峨峨鐵面寒翠柏清霜玉露繁鼓鐘會食列五鼎蘭蒸桂𨣧羅芳蓀上疏骨鯁動天𦗟南山可移舌莫捫側聞徭獠肆椙獗竊發五嶺長蛇奔海隅赤子苦脅從如掩澤雉居籠樊官軍深入期格捕𭘧甲千萬乘冬暄無乃州縣失撫字彼猴而冠鶴而軒灾異示警孰不畏震驚坤軸如風掀齊魯洪流及准甸鯨呿鼇擲相吐吞公㱕補袞佐調變駿奔百𣏌埋璵璠股肱明良元首聖矯矯玉柱擎崑崙畫圖早上麒麟閣迎春先酌白獸樽吾徒無為樂閒暇剩收芋栗充晨飱曇翁三生道林老談經屢對華林園披圖再覩天日表愧我杯渡從乘鯤投機未能箭鋒直懷德請以知己論門徒散華時入室公卿問道夜叩閽玄風載揚化日永八荒壽域開皇元郊天祭地神考享降福蕳蕳施聖孫奕奕相輝聮棣鄂至哉地勢培重坤明公作歌播金石山礪河𭘧矢弗諼聖明日月昭萬代但願容光及覆盆曹伯圭築室曰桂齊戲作俳偕體阿仙騎蟾白銀醉折秋華餐玉屑霓裳曲散墮清塵涼夜素娥悲白髮玉輪碾香空翠寒流光萬里君合歡大星漸低海色白高齊翠影空團團萬卷芳心期厚地憔悴秋香忍相棄百年苦使富貴羈淮南小山㱕不㱕送許典史杜老愛為青城客不唾其地心惻惻我居錢唐三十年與君况是巷南北我來金陵主官寺君佐邑宰為長吏奔趨同是可憐生貴賤何分等兒戲方今人情尚往復吏事公才要精熟君雖足疾善應酬跰𨇤可擬追風速獄訟簿書森似束剖决詳明如破竹鳥臺巖巖人側足霜威砭體寒生粟近聞郡縣不知戒高冠駟馬多顛覆君今美解反瓜期縣幕雖升良不辱父老扶携邑長留載酒百車折軸我自山人寡送迎作歌庶以勵風俗贈醫者夏仁齊宋清知名自柳子夏生何幸逢魯公魯公况是國元老品題孰敢當才雄誠藝潛宮稱絶藝喜動天顏錫金幣後來竊比介推賢徵車不入都門市一自有一乾坤誰道天人隔幾塵白榆紅杏成行種雞犬仙家萬戶春莫怪風塵雕玉質芳名誤被時人識更將草木代蟲魚隂功早已標仙藉我行南北倦將迎何暇役君問養生身幻不須憂二竪心安那用守三彭是身是病從何起因癡有愛淪生死天華如雨石房深誰識毗耶老居士寄隆祥使司張司亟聖皇孝治嚴宗禋祠官秩秩皆大臣光動雲霄金鸑鷟駿奔風日天麒麟我公惻怚劇忠愛精誠默與神靈會氍毹華雨佛壇深玉色天容儼如在潛宮重念大江南江華冥冥柳𣯶𣯶白頭父老望巡幸雲車風馬龍為驂古昔褒崇前聖墓守墓猶令復其賦山中御榻神龍護忍對羹𡒅重思慕省臺入移副宸衷我公驅馳早夜同門徒書來感深意一飯必報心忡忡相知何必論相見千里同風如對面終願臺端有高選繡衣南來尉懷戀湯氏義門詩九江義門是吾族流落四方困窮獨幼承慈訓寄空宗隻影江湖隨鴈鶩吳門湯氏碩且蕃七世同居二百年中書旌表部符下郡乘載之太史傳幸際明時歌有道誰謂古來風俗好孔子東西南北人周公兄弟不相保蘭蕙同芳圖為彥常賦生子當如陳仲弓元芳季芳古無同後來氏亦聯壁皆以二季奉一翁二難繼美復繼世爰有衛墟之逯氏王孫揮灑寄清標同芳德宜蘭蕙前登佩玉舞斕班後者巧笑生眉彎置之臺閣伯仲間况復齊名大小山休論九畹與百畒優劣較香華可數離騷三復對靈均再鼓朱弦尉𡰱父蒲室集卷之三目録律詩五言送趙公子去疾侍平章魯國公歸蜀次張夢臣侍御游鍾山五十韻述懷送觀空海歸臨川七十韻送宋誠夫侍郎福建注選歸朝送何彥敬赴山東憲幕送暉昧谷歸蜀完者䔍捴管瑞麥詩送鎦文美知事赴燕南
